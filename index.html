<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Melodino 🎹</title>
  <meta name="description" content="Apprends le piano en t'amusant ! App gratuite pour enfants 4-10 ans. Compatible ROLI LUMI.">
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Melodino">
  <link rel="manifest" href="_assets/manifest.json">
  <link rel="apple-touch-icon" href="_assets/icon-192.svg">
  <meta property="og:title" content="Melodino — Apprends le piano en t'amusant !">
  <meta property="og:description" content="App piano gamifiee pour enfants. Gratuite, open-source, compatible ROLI LUMI.">
  <meta property="og:type" content="website">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"SoftwareApplication","name":"Melodino","applicationCategory":"EducationalApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"EUR"}}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- soundfont-player: loads Salamander Grand Piano samples from Gleitz CDN -->
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.11.0/dist/soundfont-player.min.js"></script>
  <style>
/* ================================================================
   MELODINO — DESIGN SYSTEM
   ================================================================ */
:root {
  --bg:#0F0F1A; --surface:#1A1A2E; --surface-2:#22223C;
  --border:#2A2A4A; --border-soft:#1E1E38;
  --purple:#7C3AED; --purple-light:#9D6EFF; --purple-dark:#5B21B6;
  --purple-glow:rgba(124,58,237,0.35); --purple-subtle:rgba(124,58,237,0.12);
  --gold:#F59E0B; --gold-light:#FBBF24; --gold-glow:rgba(245,158,11,0.35);
  --green:#10B981; --green-light:#34D399;
  --red:#EF4444; --red-glow:rgba(239,68,68,0.3);
  --text:#F8FAFC; --text-muted:#94A3B8; --text-dim:#4A5568;
  --key-white:#F5F0E8; --key-black:#1A1A1A;
  --note-C:#FF6B6B; --note-D:#FF9F43; --note-E:#FECA57;
  --note-F:#48DBFB; --note-G:#1DD1A1; --note-A:#A29BFE; --note-B:#FD79A8;
  --font-h:'Nunito',system-ui,sans-serif; --font-b:'Inter',system-ui,sans-serif;
  --r-sm:12px; --r-md:16px; --r-lg:24px; --r-full:9999px;
  --t-fast:150ms ease-out; --t-std:300ms ease-out;
  --header-h:56px; --nav-h:60px;
}
@media(prefers-color-scheme:light){:root:not(.theme-dark){--bg:#F8F9FC;--surface:#FFF;--surface-2:#F1F3F9;--border:#E2E8F0;--text:#1A202C;--text-muted:#4A5568;--key-white:#FFF;--key-black:#2D3748;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.colorblind-mode{--green:#009E73;--red:#D55E00;--gold:#F0E442;--purple:#0072B2}
.dyslexia-mode{--font-b:'OpenDyslexic',sans-serif;--font-h:'OpenDyslexic',sans-serif}
.dyslexia-mode *{letter-spacing:.05em;word-spacing:.1em;line-height:1.8}
.focus-mode .celeb-overlay,.focus-mode .badge{display:none!important}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%} body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-h);font-weight:700;font-size:16px;border:none;border-radius:var(--r-full);cursor:pointer;padding:13px 28px;user-select:none;transition:transform var(--t-fast),box-shadow var(--t-std);touch-action:manipulation}
.btn:active{transform:scale(.97)} .btn:focus-visible{outline:2px solid var(--purple-light);outline-offset:3px}
.btn-primary{background:var(--purple);color:#fff;box-shadow:0 4px 16px var(--purple-glow)}
.btn-primary:hover{background:var(--purple-light);transform:translateY(-1px)}
.btn-secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
.btn-ghost{background:transparent;color:var(--text-muted)}
.btn-gold{background:var(--gold);color:#1A1005;box-shadow:0 4px 16px var(--gold-glow)}
.btn-sm{font-size:13px;padding:8px 18px} .btn-lg{font-size:18px;padding:16px 36px}
.btn-icon{padding:10px;border-radius:var(--r-sm);min-width:48px;min-height:48px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:24px;transition:border-color var(--t-std),box-shadow var(--t-std)}
.card:hover{border-color:var(--purple);box-shadow:0 0 0 1px var(--purple),0 8px 32px rgba(0,0,0,.3)}
.progress-bar{height:8px;background:var(--border);border-radius:var(--r-full);overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--purple-light));border-radius:var(--r-full);transition:width var(--t-std)}

/* ── APP SHELL ── */
.app-header{height:var(--header-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10}
.hdr-avatar{width:36px;height:36px;border-radius:50%;background:var(--purple-subtle);display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-name{font-family:var(--font-h);font-weight:700;font-size:15px}
.hdr-spacer{flex:1}
.hdr-streak{display:flex;align-items:center;gap:4px;color:var(--gold);font-family:var(--font-h);font-weight:700;font-size:14px}
.midi-pill{padding:4px 12px;border-radius:var(--r-full);font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:var(--font-h)}
.midi-off{background:var(--surface-2);color:var(--text-dim);border:1px solid var(--border)}
.midi-on{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.app-content{flex:1;overflow:hidden;position:relative}
.app-nav{height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;flex-shrink:0;z-index:10}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-family:var(--font-h);font-size:11px;font-weight:600;padding:6px 12px;border-radius:var(--r-sm);min-width:48px;min-height:48px;justify-content:center}
.nav-btn .nav-icon{font-size:22px} .nav-btn.active{color:var(--purple)}

/* ── SCREENS ── */
.screen{display:none;position:absolute;inset:0;overflow-y:auto;padding:24px}
.screen.active{display:flex;flex-direction:column}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:999;background:linear-gradient(145deg,#1a0a2e,#0d1a2e,#0a1a0e);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;cursor:pointer;transition:opacity .5s}
#splash h1{font-family:var(--font-h);font-weight:900;font-size:clamp(32px,8vw,56px);background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#splash .icon{font-size:80px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* ── LOGIN ── */
#screen-login{justify-content:center;align-items:center;gap:24px;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(124,58,237,.15) 0%,transparent 60%),var(--bg)}
.avatar-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;width:100%;max-width:620px}
.avatar-card{background:linear-gradient(145deg,var(--surface),var(--surface-2));border:2px solid var(--border);border-radius:var(--r-lg);padding:24px;text-align:center;cursor:pointer;transition:all .2s}
.avatar-card:hover{border-color:var(--purple);transform:translateY(-4px);box-shadow:0 12px 32px rgba(124,58,237,.25)}
.ava-emoji{font-size:52px;display:block;margin-bottom:8px} .ava-name{font-family:var(--font-h);font-weight:800;font-size:16px}
.ava-stars{font-size:13px;color:var(--gold);margin-top:6px}
.add-card{border-style:dashed} .add-card .ava-emoji{opacity:.4}

/* ── HOME ── */
#screen-home{gap:24px;align-items:center}
.world-banner{display:flex;align-items:center;gap:16px;padding:16px 24px;border-radius:var(--r-md);margin-bottom:12px;font-family:var(--font-h);font-weight:800;font-size:18px}
.world-banner.locked{opacity:.4;filter:grayscale(.8)}
.world-1{background:linear-gradient(135deg,#3D5A3E,#2A3F2B);border:1px solid #5A7C5B}
.world-2{background:linear-gradient(135deg,#1E2E4A,#0F1A2E);border:1px solid #2D4A7A}
.world-3{background:linear-gradient(135deg,#3D1E3D,#261226);border:1px solid #6B2D6B}
.world-4{background:linear-gradient(135deg,#3A2200,#201200);border:1px solid #7A5000}
.song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.song-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:16px;cursor:pointer;transition:all var(--t-fast)}
.song-card:hover{border-color:var(--purple);transform:translateY(-1px)}
.song-card.locked{opacity:.35;pointer-events:none}
.song-title{font-family:var(--font-h);font-weight:700;font-size:14px;margin-bottom:4px}
.song-meta{font-size:12px;color:var(--text-muted)} .song-stars{margin-top:6px}

/* ── LESSON ── */
#screen-lesson{padding:0;flex-direction:column}
.lesson-hud{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.hud-score{font-family:var(--font-h);font-weight:800;font-size:18px}
.hud-streak{color:var(--gold);font-family:var(--font-h);font-weight:700}
.hud-progress{flex:1;margin:0 16px}
.lesson-canvas-wrap{flex:1;position:relative;background:var(--bg);overflow:hidden}
.lesson-canvas-wrap canvas{width:100%;height:100%;display:block}
.speed-selector{display:flex;gap:4px;position:absolute;top:8px;right:8px;z-index:5}
.speed-btn{font-size:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px 10px;cursor:pointer}
.speed-btn.active{border-color:var(--purple);background:var(--purple-subtle)}

/* ── PIANO ── */
.piano-wrap{container-type:inline-size;width:100%;flex-shrink:0}
.piano{display:flex;position:relative;height:180px;background:linear-gradient(180deg,var(--surface),var(--surface-2));border-top:2px solid var(--purple);user-select:none;touch-action:manipulation;box-shadow:0 -4px 20px rgba(124,58,237,.15)}
.p-key{flex:1;border-right:1px solid rgba(0,0,0,.08);background:linear-gradient(180deg,#FFF 0%,#F5F0E8 60%,#E8E0D4 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:10px;font-family:var(--font-h);font-size:12px;color:#999;font-weight:700;cursor:pointer;transition:background .1s,transform .05s;position:relative;z-index:1;border-radius:0 0 6px 6px;box-shadow:inset 0 -3px 6px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.1)}
.p-key:active,.p-key.pressed{background:var(--purple);color:#fff;transform:translateY(2px);box-shadow:0 0 16px var(--purple-glow)}
.p-key.correct{background:var(--green);color:#fff;box-shadow:0 0 20px rgba(16,185,129,.5)}
.p-key.wrong{background:var(--red);color:#fff;animation:shake .3s}
.p-key.next{background:var(--gold);color:#333;box-shadow:0 0 16px var(--gold-glow);animation:pulseGlow 1.5s ease-in-out infinite}
.p-key .finger-num{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.15);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.p-key-black{position:absolute;top:0;width:8%;height:62%;background:linear-gradient(180deg,#2D2D2D,#1A1A1A 70%,#111);z-index:2;border-radius:0 0 5px 5px;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;font-size:10px;color:#666;font-weight:600;box-shadow:0 4px 8px rgba(0,0,0,.4);transition:background .1s,transform .05s}
.p-key-black:active,.p-key-black.pressed{background:var(--purple);transform:translateY(2px)}
.p-key-black.correct{background:var(--green)} .p-key-black.wrong{background:var(--red);animation:shake .3s}
.p-key-black.next{background:var(--gold);animation:pulseGlow 1.5s ease-in-out infinite}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px var(--gold-glow)}50%{box-shadow:0 0 24px var(--gold-glow)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@container(max-width:500px){.piano{height:130px}.p-key{font-size:10px}}
@container(min-width:800px){.piano{height:220px}.p-key{font-size:14px}}

/* ── FREE PLAY ── */
#screen-freeplay{padding:0;flex-direction:column}
.freeplay-controls{display:flex;align-items:center;gap:16px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.octave-display{font-family:var(--font-h);font-weight:800;font-size:20px}

/* ── SETTINGS ── */
#screen-settings{gap:24px;align-items:center}
.settings-group{width:100%;max-width:500px}
.settings-title{font-family:var(--font-h);font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px}
.setting-label{font-weight:600}
.toggle{position:relative;width:48px;height:28px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:var(--r-full);cursor:pointer;transition:background var(--t-fast)}
.toggle-track::after{content:'';position:absolute;left:3px;top:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform var(--t-fast)}
.toggle input:checked+.toggle-track{background:var(--purple)}
.toggle input:checked+.toggle-track::after{transform:translateX(20px)}
input[type="range"]{-webkit-appearance:none;width:120px;height:6px;background:var(--border);border-radius:var(--r-full);outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:var(--purple);border-radius:50%;cursor:pointer}
.setting-select{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;font-family:var(--font-b);font-size:14px}

/* ── PARENT ── */
#screen-parent{gap:24px;align-items:center}
.pin-overlay{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.pin-digit{width:52px;height:60px;text-align:center;font-size:28px;font-family:var(--font-h);font-weight:800;background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);color:var(--text)}
.pin-digit:focus{border-color:var(--purple);outline:none}
.stat-num{font-family:var(--font-h);font-weight:900;font-size:36px;color:var(--purple)}
.stat-label{font-size:13px;color:var(--text-muted)}

/* ── CELEBRATION ── */
.celeb-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.celeb-overlay.active{display:flex}
.celeb-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:48px 24px;text-align:center;max-width:400px;width:90%;animation:celebPop .5s ease-out}
@keyframes celebPop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.celeb-emoji{font-size:64px;margin-bottom:16px} .celeb-title{font-family:var(--font-h);font-weight:900;font-size:28px;margin-bottom:8px}
.celeb-sub{color:var(--text-muted);margin-bottom:24px} .celeb-stars{font-size:40px;margin-bottom:24px}
.hidden{display:none!important}
  </style>
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="icon">🎹</div>
    <h1>Melodino</h1>
    <p style="color:#9090b0;font-size:18px;text-align:center;max-width:400px">Apprends le piano en t'amusant !</p>
    <button class="btn btn-primary btn-lg" id="splash-btn">▶ Commencer</button>
    <p style="color:#4A5568;font-size:13px;margin-top:16px">🎹 Compatible ROLI LUMI &amp; claviers MIDI</p>
  </div>

  <header class="app-header" id="app-header" style="display:none">
    <div class="hdr-avatar" id="hdr-avatar">🎹</div>
    <span class="hdr-name" id="hdr-name">Melodino</span>
    <div class="hdr-spacer"></div>
    <div class="hdr-streak" id="hdr-streak">🔥 <span id="hdr-streak-num">0</span></div>
    <button class="midi-pill midi-off" id="midi-pill">🎹 —</button>
    <button class="btn-icon btn-ghost" id="hdr-parent" aria-label="Espace parent">🔒</button>
  </header>

  <main class="app-content">
    <section class="screen" id="screen-login">
      <span style="font-size:64px">🎹</span>
      <h1 style="font-family:var(--font-h);font-weight:900;font-size:clamp(28px,6vw,52px);background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">Melodino</h1>
      <p style="color:var(--text-muted);font-size:18px" id="login-sub">Qui joue aujourd'hui ?</p>
      <div class="avatar-grid" id="avatar-grid"></div>
    </section>
    <section class="screen" id="screen-home"><div id="worlds-wrap"></div></section>
    <section class="screen" id="screen-lesson">
      <div class="lesson-hud">
        <button class="btn btn-ghost btn-sm" id="lesson-back">←</button>
        <span class="hud-score" id="hud-score">0</span>
        <div class="hud-progress"><div class="progress-bar"><div class="progress-fill" id="hud-fill" style="width:0%"></div></div></div>
        <span class="hud-streak" id="hud-streak-game">🔥 0</span>
      </div>
      <div class="lesson-canvas-wrap"><canvas id="game-canvas"></canvas>
        <div class="speed-selector">
          <button class="speed-btn" data-speed="turtle">🐢</button>
          <button class="speed-btn active" data-speed="normal">🎵</button>
          <button class="speed-btn" data-speed="rabbit">🐇</button>
          <button class="speed-btn" data-speed="rocket">🚀</button>
        </div>
      </div>
      <div class="piano-wrap"><div class="piano" id="lesson-piano"></div></div>
    </section>
    <section class="screen" id="screen-freeplay">
      <div class="freeplay-controls">
        <button class="btn btn-ghost btn-sm" id="fp-back">←</button>
        <div class="hdr-spacer"></div>
        <button class="btn btn-ghost btn-icon" id="oct-down">◀</button>
        <span class="octave-display" id="oct-disp">Do4</span>
        <button class="btn btn-ghost btn-icon" id="oct-up">▶</button>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end">
        <div class="piano-wrap"><div class="piano" id="fp-piano"></div></div>
      </div>
    </section>
    <section class="screen" id="screen-settings">
      <h2 style="font-family:var(--font-h);font-weight:900;font-size:24px;margin-bottom:16px">Réglages</h2>
      <div class="settings-group" id="settings-wrap"></div>
    </section>
    <section class="screen" id="screen-parent">
      <div class="pin-overlay" id="pin-overlay">
        <span style="font-size:48px">🔒</span>
        <h2 style="font-family:var(--font-h);font-weight:800">Code parent</h2>
        <div style="display:flex;gap:8px" id="pin-wrap"></div>
        <p id="pin-err" style="color:var(--red);font-size:14px" class="hidden"></p>
      </div>
      <div id="parent-content" class="hidden" style="width:100%;max-width:500px;display:flex;flex-direction:column;gap:24px;align-items:center">
        <h2 style="font-family:var(--font-h);font-weight:900;font-size:24px">Espace Parent</h2>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%">
          <div class="card" style="text-align:center"><div class="stat-num" id="st-songs">0</div><div class="stat-label">Morceaux</div></div>
          <div class="card" style="text-align:center"><div class="stat-num" id="st-stars">0</div><div class="stat-label">Étoiles</div></div>
          <div class="card" style="text-align:center"><div class="stat-num" id="st-acc">0%</div><div class="stat-label">Précision</div></div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
          <button class="btn btn-secondary btn-sm" id="btn-export">📥 Exporter</button>

/* ================================================================
   PART 1 — LUMI SYSEX LIBRARY (from xivilay/lumi-web-control)
   ================================================================ */
const LumiSysex = (() => {
  const ck = (v) => { let s=v.length; for(let i=0;i<v.length;i++) s=(s*3+v[i])&0xff; return s&0x7f; };
  function BA(){this.values=[];this.num_bits=0;
    this.append=function(value,size=7){let u=parseInt(this.num_bits%7),p=0;if(u>0){p=this.values[this.values.length-1];this.values.pop()}this.num_bits+=size;while(size>0){p|=(value<<u)&127;size-=(7-u);value>>=(7-u);this.values.push(p);p=0;u=0}};
    this.get=function(){while(this.values.length<8)this.values.push(0);return this.values}}
  const HDR=[0xF0,0x00,0x21,0x10], DEV=0x37;
  function send(out,cmd){if(!out)return;try{out.send([...HDR,0x77,DEV,...cmd,ck(cmd),0xF7])}catch(e){}}
  function getColor(id,hex){const c=parseInt(hex.replace('#',''),16),r=(c>>16)&0xFF,g=(c>>8)&0xFF,b=c&0xFF;const bits=new BA();bits.append(0x10,7);bits.append(0x20+0x10*(id&1),7);bits.append(0b00100,5);bits.append(b,8);bits.append(g,8);bits.append(r,8);bits.append(0xFF,8);return bits.get()}
  function getBrightness(v){const b=new BA();b.append(0x10,7);b.append(0x40,7);b.append(0b00100,5);b.append(v,7);return b.get()}
  function getOctave(v){const b=new BA();b.append(0x10,7);b.append(0x40,7);b.append(0b00000,5);b.append(v,32);return b.get()}
  function getColorMode(v){const b=new BA();b.append(0x10,7);b.append(0x40,7);b.append(0b00010,5);b.append(v&3,2);return b.get()}
  const scales={'Major':[0x02,0x00],'Minor':[0x22,0x00],'Harmonic Minor':[0x42,0x00],'Pentatonic Major':[0x02,0x01],'Blues':[0x42,0x01],'Chromatic':[0x42,0x04]};
  function getScale(n){return[0x10,0x60,...(scales[n]||scales.Major),0,0,0,0]}
  const keyMap={'C':[0x03,0x00],'C#':[0x23,0x00],'D':[0x43,0x00],'D#':[0x63,0x00],'E':[0x03,0x01],'F':[0x23,0x01],'F#':[0x43,0x01],'G':[0x63,0x01],'G#':[0x03,0x02],'A':[0x23,0x02],'A#':[0x43,0x02],'B':[0x63,0x02]};
  function getKey(n){return[0x10,0x30,...(keyMap[n]||keyMap.C),0,0,0,0]}
  return{send,getColor,getBrightness,getOctave,getColorMode,getScale,getKey};
})();

/* ================================================================
   PART 2 — AUDIO ENGINE (soundfont-player + fallback)
   ================================================================ */
const AudioEng = (() => {
  let ctx=null, piano=null, loading=false, ready=false;
  const FREQ={};
  ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'].forEach((n,i)=>{for(let o=2;o<=7;o++){FREQ[n+o]=440*Math.pow(2,((o+1)*12+i-69)/12)}});

  async function init(){
    ctx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    if(ctx.state==='suspended') await ctx.resume();
    loadSoundfont();
  }
  async function loadSoundfont(){
    if(loading||ready)return;loading=true;
    try{
      piano=await Soundfont.instrument(ctx,'acoustic_grand_piano',{soundfont:'MusyngKite',format:'mp3'});
      ready=true;
    }catch(e){ready=false}
    loading=false;
  }
  function resume(){if(ctx&&ctx.state==='suspended')ctx.resume()}
  function play(note,dur=800,vel=80){
    if(!ctx){init();return}resume();
    if(ready&&piano){piano.play(note,ctx.currentTime,{gain:vel/127,duration:dur/1000});return}
    // Fallback: triangle wave
    const f=FREQ[note];if(!f)return;const v=(vel/127)*.4,now=ctx.currentTime;
    const o=ctx.createOscillator(),e=ctx.createGain();o.type='triangle';o.frequency.value=f;
    e.gain.setValueAtTime(0,now);e.gain.linearRampToValueAtTime(v,now+.02);e.gain.exponentialRampToValueAtTime(.001,now+dur/1000);
    o.connect(e);e.connect(ctx.destination);o.start(now);o.stop(now+dur/1000+.1);
  }
  function playInstant(note,vel=90){play(note,1200,vel)}
  function setVol(v){/* volume via gain node if needed */}
  return{init,resume,play,playInstant,setVol,isReady:()=>ready};
})();

/* ================================================================
   PART 3 — MIDI MANAGER
   ================================================================ */
const MIDI = (() => {
  let access=null,input=null,output=null,devName=null,isLumi=false;
  const onOn=[],onOff=[];
  const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function m2n(n){return{note:NN[n%12],octave:Math.floor(n/12)-1,full:NN[n%12]+(Math.floor(n/12)-1),midi:n}}
  function handle(e){
    const[st,n,v]=e.data,cmd=st&0xF0,info=m2n(n);
    if(cmd===0x90&&v>0)onOn.forEach(cb=>cb({...info,velocity:v}));
    else if(cmd===0x80||(cmd===0x90&&v===0))onOff.forEach(cb=>cb({...info,velocity:0}));
  }
  async function init(){
    if(!navigator.requestMIDIAccess)return;
    try{access=await navigator.requestMIDIAccess({sysex:true})}
    catch{try{access=await navigator.requestMIDIAccess({sysex:false})}catch{return}}
    access.onstatechange=()=>scan();scan();
  }
  function scan(){
    if(!access)return;
    // Find best input (LUMI priority)
    let best=null;isLumi=false;output=null;
    for(const inp of access.inputs.values()){if(inp.name.toLowerCase().includes('lumi')){best=inp;isLumi=true;break}}
    if(!best){const f=access.inputs.values().next().value;if(f)best=f}
    for(const out of access.outputs.values()){if(out.name.toLowerCase().includes('lumi')){output=out;break}}
    if(best){
      if(input)input.onmidimessage=null;
      input=best;input.onmidimessage=handle;devName=best.name;
      if(isLumi&&output){setTimeout(()=>{
        LumiSysex.send(output,LumiSysex.getOctave(0));
        LumiSysex.send(output,LumiSysex.getColorMode(1));
        LumiSysex.send(output,LumiSysex.getColor(0,'#7C3AED'));
        LumiSysex.send(output,LumiSysex.getBrightness(80));
        LumiSysex.send(output,LumiSysex.getScale('Major'));
        LumiSysex.send(output,LumiSysex.getKey('C'));
      },300)}
    }else{input=null;devName=null}
    updatePill();
  }
  function updatePill(){
    const p=document.getElementById('midi-pill');if(!p)return;
    if(devName){p.className='midi-pill midi-on';p.textContent='🎹 '+(isLumi?'LUMI':devName)}
    else{p.className='midi-pill midi-off';p.textContent='🎹 '+t('midi').disconnected}
  }
  return{init,onOn,onOff,getOutput:()=>output,isLumi:()=>isLumi,updatePill};
})();

/* ================================================================
   PART 5 — STORAGE (IndexedDB + fallback)
   ================================================================ */
const Store = (() => {
  let db=null;const DB='melodino',V=1;
  function init(){return new Promise(r=>{if(!window.indexedDB){r();return}const q=indexedDB.open(DB,V);q.onupgradeneeded=e=>{const d=e.target.result;['profiles','progress','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='progress'?'key':'id'})})};q.onsuccess=e=>{db=e.target.result;r()};q.onerror=()=>r()})}
  function tx(s,m){return db.transaction(s,m).objectStore(s)}
  function get(s,k){if(!db)return Promise.resolve(JSON.parse(localStorage.getItem(`m_${s}_${k}`)||'null'));return new Promise(r=>{const q=tx(s,'readonly').get(k);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null)})}
  function put(s,v){if(!db){localStorage.setItem(`m_${s}_${v.id||v.key}`,JSON.stringify(v));return Promise.resolve()}return new Promise(r=>{const q=tx(s,'readwrite').put(v);q.onsuccess=()=>r();q.onerror=()=>r()})}
  function all(s){if(!db){const items=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith(`m_${s}_`))try{items.push(JSON.parse(localStorage.getItem(k)))}catch{}}return Promise.resolve(items)}return new Promise(r=>{const q=tx(s,'readonly').getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>r([])})}
  function del(s,k){if(!db){localStorage.removeItem(`m_${s}_${k}`);return Promise.resolve()}return new Promise(r=>{const q=tx(s,'readwrite').delete(k);q.onsuccess=()=>r();q.onerror=()=>r()})}
  return{init,get,put,all,del};
})();

/* ================================================================
   PART 6 — GAME ENGINE (Canvas falling notes + scoring)
   ================================================================ */
const Game = (() => {
  let canvas,ctx2d,song=null,speed='normal',ni=0,score=0,streak=0,maxStreak=0,correct=0,total=0,running=false,notes=[];
  const FALL=150,HIT=0.85;
  function init(){canvas=document.getElementById('game-canvas');ctx2d=canvas.getContext('2d')}
  function start(s,spd='normal'){
    song=s;speed=spd;ni=0;score=0;streak=0;maxStreak=0;correct=0;total=0;notes=[];running=true;
    resize();schedule();updateHUD();
    // Configure LUMI for this song
    if(MIDI.isLumi()){const o=MIDI.getOutput();LumiSysex.send(o,LumiSysex.getKey(s.key||'C'));LumiSysex.send(o,LumiSysex.getScale(s.scale||'Major'));LumiSysex.send(o,LumiSysex.getColorMode(1));LumiSysex.send(o,LumiSysex.getColor(0,'#7C3AED'))}
    requestAnimationFrame(loop);
  }
  function resize(){const w=canvas.parentElement;canvas.width=w.clientWidth*devicePixelRatio;canvas.height=w.clientHeight*devicePixelRatio;ctx2d.scale(devicePixelRatio,devicePixelRatio)}
  function schedule(){
    const bpm=song.bpm[speed]||song.bpm.normal,beat=60000/bpm;
    const dm={whole:4,half:2,'dotted-half':3,quarter:1,'dotted-quarter':1.5,eighth:.5,sixteenth:.25};
    let t=0;song.notes.forEach((n,i)=>{const d=(dm[n.duration]||1)*beat;notes.push({note:n.note,hand:n.hand,finger:n.finger,y:-(t/1000)*FALL-80,dur:d,hit:false,missed:false,idx:i});t+=d});
  }
  let lastT=0;
  function loop(ts){
    if(!running)return;const dt=Math.min(ts-(lastT||ts),50)/1000;lastT=ts;
    const w=canvas.width/devicePixelRatio,h=canvas.height/devicePixelRatio,hitY=h*HIT;
    ctx2d.clearRect(0,0,w,h);
    // Hit line
    ctx2d.strokeStyle='rgba(124,58,237,.3)';ctx2d.lineWidth=2;ctx2d.beginPath();ctx2d.moveTo(0,hitY);ctx2d.lineTo(w,hitY);ctx2d.stroke();
    const sm={turtle:.6,normal:1,rabbit:1.4,rocket:1.8}[speed]||1;
    // Get note color
    function noteColor(n){const l=n.replace(/[0-9#b]/g,'');const colors={C:'#FF6B6B',D:'#FF9F43',E:'#FECA57',F:'#48DBFB',G:'#1DD1A1',A:'#A29BFE',B:'#FD79A8'};return colors[l]||'#7C3AED'}
    notes.forEach(fn=>{
      if(!fn.hit&&!fn.missed)fn.y+=FALL*sm*dt;
      // Wait mode: current note stays at hit line
      if(!fn.hit&&!fn.missed&&fn.idx===ni)fn.y=hitY-12;
      const nw=Math.max(w/14,30),nh=24;
      const kp={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[fn.note.replace(/[0-9#b]/g,'')]||0;
      const x=(kp/14)*w;
      if(fn.y>-nh&&fn.y<h+nh){
        ctx2d.fillStyle=fn.hit?'rgba(16,185,129,.5)':fn.missed?'rgba(239,68,68,.3)':noteColor(fn.note)+'cc';
        ctx2d.beginPath();ctx2d.roundRect(x+2,fn.y,nw-4,nh,6);ctx2d.fill();
        ctx2d.fillStyle='#fff';ctx2d.font='bold 11px Nunito';ctx2d.textAlign='center';
        ctx2d.fillText(noteDisp(fn.note),x+nw/2,fn.y+16);
      }
    });
    if(ni>=song.notes.length){running=false;endSong();return}
    requestAnimationFrame(loop);
  }
  function input(noteName){
    if(!running||ni>=song.notes.length)return;
    const exp=song.notes[ni],fn=notes[ni];
    if(noteName===exp.note){
      fn.hit=true;correct++;total++;streak++;if(streak>maxStreak)maxStreak=streak;score+=10+streak;ni++;
      highlightKey(noteName,'correct');
      // LUMI color based on streak
      if(MIDI.isLumi()){const o=MIDI.getOutput();if(streak>10)LumiSysex.send(o,LumiSysex.getColor(0,'#10B981'));if(streak>20)LumiSysex.send(o,LumiSysex.getColor(0,'#F59E0B'))}
      setTimeout(()=>{clearHL();if(ni<song.notes.length)highlightKey(song.notes[ni].note,'next')},200);
    }else{
      total++;streak=0;highlightKey(noteName,'wrong');
      if(MIDI.isLumi()){const o=MIDI.getOutput();LumiSysex.send(o,LumiSysex.getColor(0,'#EF4444'));setTimeout(()=>LumiSysex.send(o,LumiSysex.getColor(0,'#7C3AED')),200)}
      setTimeout(()=>clearHL(),300);
    }
    updateHUD();
  }
  function updateHUD(){
    const el=id=>document.getElementById(id);
    el('hud-score').textContent=score;el('hud-streak-game').textContent='🔥 '+streak;
    if(song)el('hud-fill').style.width=Math.round(ni/song.notes.length*100)+'%';
  }
  function endSong(){
    if(MIDI.isLumi()){const o=MIDI.getOutput();LumiSysex.send(o,LumiSysex.getColorMode(0));setTimeout(()=>LumiSysex.send(o,LumiSysex.getColorMode(1)),3000)}
    clearHL();const acc=total>0?Math.round(correct/total*100):0;
    const stars=acc>=95?3:acc>=80?2:1;
    saveProg(song.id,stars,acc,score);showCeleb(stars,acc,score);
  }
  function setSpeed(s){speed=s}
  function stop(){running=false;if(MIDI.isLumi()){const o=MIDI.getOutput();LumiSysex.send(o,LumiSysex.getColor(0,'#7C3AED'))}clearHL()}
  return{init,start,input,setSpeed,stop};
})();

/* ================================================================
   PART 7 — PIANO BUILDER
   ================================================================ */
function buildPiano(id,startOct=4,numOct=2){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  const whites=['C','D','E','F','G','A','B'],blacks={C:'C#',D:'D#',F:'F#',G:'G#',A:'A#'},boff={C:.65,D:1.75,F:3.6,G:4.7,A:5.8};
  for(let o=startOct;o<startOct+numOct;o++){const oo=(o-startOct)*7;
    whites.forEach((n,i)=>{
      const k=document.createElement('div');k.className='p-key';k.dataset.note=n+o;
      k.innerHTML=`<span class="finger-num" style="display:none"></span><span>${noteDisp(n+o)}</span>`;
      k.setAttribute('role','button');k.setAttribute('aria-label',noteDisp(n+o));
      k.addEventListener('pointerdown',e=>{e.preventDefault();onKey(n+o)});
      k.addEventListener('pointerup',()=>offKey(n+o));
      el.appendChild(k);
      if(blacks[n]){const bk=document.createElement('div');bk.className='p-key-black';bk.dataset.note=blacks[n]+o;
        bk.style.left=((oo+boff[n])/(numOct*7))*100+'%';
        bk.setAttribute('role','button');bk.setAttribute('aria-label',noteDisp(blacks[n]+o));
        bk.addEventListener('pointerdown',e=>{e.preventDefault();onKey(blacks[n]+o)});
        bk.addEventListener('pointerup',()=>offKey(blacks[n]+o));
        el.appendChild(bk)}
    })}
}
function onKey(n){AudioEng.resume();AudioEng.playInstant(n);const s=document.querySelector('.screen.active');if(s&&s.id==='screen-lesson')Game.input(n)}
function offKey(n){}
function highlightKey(n,state){document.querySelectorAll(`[data-note="${n}"]`).forEach(k=>{k.classList.remove('correct','wrong','next','pressed');if(state)k.classList.add(state)})}
function clearHL(){document.querySelectorAll('.p-key,.p-key-black').forEach(k=>k.classList.remove('correct','wrong','next','pressed'))}

/* ================================================================
   PART 8 — KEYBOARD MAPPING (AZERTY French)
   ================================================================ */
const AZERTY={'w':'C3','x':'D3','c':'E3','v':'F3','b':'G3','n':'A3',',':'B3',
  'q':'C4','s':'D4','d':'E4','f':'F4','g':'G4','h':'A4','j':'B4','k':'C5','l':'D5','m':'E5',
  'z':'C#3','e':'D#3','t':'F#3','y':'G#3','u':'A#3','a':'C#4'};
const down=new Set();
document.addEventListener('keydown',e=>{if(e.repeat||e.target.tagName==='INPUT')return;const n=AZERTY[e.key.toLowerCase()];if(n&&!down.has(e.key)){down.add(e.key);onKey(n);highlightKey(n,'pressed')}
  if(e.key==='Escape'){const a=document.querySelector('.screen.active');if(a&&a.id!=='screen-login'&&a.id!=='screen-home')showScreen('screen-home')}});
document.addEventListener('keyup',e=>{down.delete(e.key);const n=AZERTY[e.key.toLowerCase()];if(n)highlightKey(n,null)});

/* ================================================================
   PART 9 — PROFILES + PROGRESSION
   ================================================================ */
let curProfile=null,profiles=[],progress={};
async function loadProfiles(){profiles=await Store.all('profiles');renderLogin()}
function renderLogin(){
  const g=document.getElementById('avatar-grid');g.innerHTML='';
  profiles.forEach(p=>{const c=document.createElement('div');c.className='avatar-card';
    c.innerHTML=`<span class="ava-emoji">${p.avatar}</span><span class="ava-name">${esc(p.name)}</span><div class="ava-stars">⭐ ${p.totalStars||0}</div>`;
    c.addEventListener('click',()=>selectProfile(p));g.appendChild(c)});
  if(profiles.length<6){const a=document.createElement('div');a.className='avatar-card add-card';
    a.innerHTML=`<span class="ava-emoji">➕</span><span class="ava-name">${t('add')}</span>`;
    a.addEventListener('click',newProfile);g.appendChild(a)}
}
const AVATARS=['🐱','🐶','🐰','🦊','🐻','🐼','🐨','🦁','🐸','🦄','🐙','🦋','🐢','🦜','🐬','🦉','🐝','🦩','🐳','🦘'];
function newProfile(){const n=prompt(t('enterName'));if(!n||!n.trim())return;const age=parseInt(prompt(t('enterAge')))||6;
  const p={id:Date.now().toString(),name:n.trim().substring(0,20),avatar:AVATARS[Math.floor(Math.random()*AVATARS.length)],age:Math.max(3,Math.min(12,age)),totalStars:0,streakDays:0,lastDate:null};
  Store.put('profiles',p).then(()=>{profiles.push(p);renderLogin()})}
async function selectProfile(p){
  curProfile=p;progress={};const all=await Store.all('progress');
  all.filter(r=>r.key.startsWith(p.id+'_')).forEach(r=>{progress[r.songId]=r});
  document.getElementById('hdr-avatar').textContent=p.avatar;document.getElementById('hdr-name').textContent=p.name;
  document.getElementById('hdr-streak-num').textContent=p.streakDays||0;
  const today=new Date().toISOString().slice(0,10);
  if(p.lastDate!==today){const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);p.streakDays=p.lastDate===yest?(p.streakDays||0)+1:1;p.lastDate=today;await Store.put('profiles',p)}
  showScreen('screen-home');renderHome()}
async function saveProg(sid,stars,acc,sc){
  if(!curProfile)return;const k=curProfile.id+'_'+sid,ex=progress[sid],best=ex?Math.max(ex.stars,stars):stars;
  const r={key:k,songId:sid,stars:best,accuracy:acc,score:sc,date:new Date().toISOString()};
  progress[sid]=r;await Store.put('progress',r);
  let tot=0;Object.values(progress).forEach(p=>tot+=p.stars);curProfile.totalStars=tot;await Store.put('profiles',curProfile)}

/* ================================================================
   PART 10 — HOME SCREEN
   ================================================================ */
function renderHome(){
  const w=document.getElementById('worlds-wrap');w.innerHTML='';
  const ts=curProfile?curProfile.totalStars||0:0;
  WORLDS.forEach(world=>{
    const unlocked=ts>=world.starsReq;
    const sec=document.createElement('div');sec.style.cssText='width:100%;max-width:600px;margin-bottom:24px';
    const ban=document.createElement('div');ban.className=`world-banner ${world.cls} ${unlocked?'':'locked'}`;
    ban.innerHTML=`<span style="font-size:24px">${world.icon}</span> ${t(world.name)}`;
    if(!unlocked)ban.innerHTML+=` <span style="font-size:12px;margin-left:auto;opacity:.7">${t('needStars',{n:world.starsReq})}</span>`;
    sec.appendChild(ban);
    if(unlocked){const sg=document.createElement('div');sg.className='song-grid';
      SONGS.filter(s=>s.world===world.id).forEach(song=>{const sp=progress[song.id];
        const c=document.createElement('div');c.className='song-card';
        const st=sp?'⭐'.repeat(sp.stars)+'☆'.repeat(3-sp.stars):'☆☆☆';
        c.innerHTML=`<div class="song-title">${esc(song.title)}</div><div class="song-meta">${song.composer}</div><div class="song-stars">${st}</div>`;
        c.addEventListener('click',()=>startLesson(song));sg.appendChild(c)});
      sec.appendChild(sg)}
    w.appendChild(sec)});
}
function startLesson(song){
  showScreen('screen-lesson');buildPiano('lesson-piano',3,2);Game.init();Game.start(song,speed||'normal');
  if(song.notes.length>0)highlightKey(song.notes[0].note,'next');
  speak(song.title)}

/* ================================================================
   PART 11 — CELEBRATION
   ================================================================ */
function showCeleb(stars,acc,sc){
  const el=id=>document.getElementById(id);
  el('c-emoji').textContent=stars>=3?'🌟':stars>=2?'⭐':'👏';
  el('c-title').textContent=stars>=3?t('fantastic'):stars>=2?t('bravo'):t('almost');
  el('c-sub').textContent=`${acc}% ${t('correct')} — ${t('score')}: ${sc}`;
  el('c-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  el('c-btn').textContent=t('back');
  el('c-btn').onclick=()=>{el('celeb').classList.remove('active');showScreen('screen-home');renderHome()};
  el('celeb').classList.add('active');speak(stars>=3?t('fantastic'):t('bravo'));
}

/* ================================================================
   PART 12 — SCREEN MANAGER
   ================================================================ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.screen===id));
  const show=id!=='screen-login';
  document.getElementById('app-header').style.display=show?'flex':'none';
  document.getElementById('app-nav').style.display=show?'flex':'none';
  if(id!=='screen-lesson')Game.stop();
}

/* ================================================================
   PART 13 — SETTINGS
   ================================================================ */
function renderSettings(){
  const w=document.getElementById('settings-wrap');w.innerHTML='';
  const items=[
    {type:'select',label:t('lang'),options:[{v:'fr',l:'🇫🇷 Français'},{v:'en',l:'🇬🇧 English'}],cur:LANG,fn:v=>{LANG=v;renderSettings();renderHome()}},
    {type:'range',label:t('volume'),min:0,max:100,cur:70,fn:v=>AudioEng.setVol(v/100)},
    {type:'toggle',label:t('colorblind'),cur:document.body.classList.contains('colorblind-mode'),fn:v=>document.body.classList.toggle('colorblind-mode',v)},
    {type:'toggle',label:t('dyslexia'),cur:document.body.classList.contains('dyslexia-mode'),fn:v=>document.body.classList.toggle('dyslexia-mode',v)},
    {type:'toggle',label:t('reducedMotion'),cur:document.body.classList.contains('reduced-motion'),fn:v=>document.body.classList.toggle('reduced-motion',v)},
    {type:'toggle',label:t('focusMode'),cur:document.body.classList.contains('focus-mode'),fn:v=>document.body.classList.toggle('focus-mode',v)},
    {type:'button',label:t('fullscreen'),fn:()=>{document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}}
  ];
  items.forEach(it=>{
    const r=document.createElement('div');r.className='setting-row';
    r.innerHTML=`<span class="setting-label">${it.label}</span>`;
    if(it.type==='select'){const s=document.createElement('select');s.className='setting-select';it.options.forEach(o=>{const op=document.createElement('option');op.value=o.v;op.textContent=o.l;if(o.v===it.cur)op.selected=true;s.appendChild(op)});s.onchange=()=>it.fn(s.value);r.appendChild(s)}
    else if(it.type==='range'){const i=document.createElement('input');i.type='range';i.min=it.min;i.max=it.max;i.value=it.cur;i.oninput=()=>it.fn(+i.value);r.appendChild(i)}
    else if(it.type==='toggle'){const l=document.createElement('label');l.className='toggle';l.innerHTML=`<input type="checkbox" ${it.cur?'checked':''}><span class="toggle-track"></span>`;l.querySelector('input').onchange=e=>it.fn(e.target.checked);r.appendChild(l)}
    else if(it.type==='button'){const b=document.createElement('button');b.className='btn btn-secondary btn-sm';b.textContent=it.label;b.onclick=it.fn;r.appendChild(b)}
    w.appendChild(r)});
}

/* ================================================================
   PART 14 — PARENT DASHBOARD
   ================================================================ */
function initParent(){
  const w=document.getElementById('pin-wrap');w.innerHTML='';
  for(let i=0;i<4;i++){const inp=document.createElement('input');inp.type='password';inp.maxLength=1;inp.className='pin-digit';inp.inputMode='numeric';
    inp.oninput=e=>{if(e.target.value&&i<3)w.children[i+1].focus();checkPIN()};
    inp.onkeydown=e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)w.children[i-1].focus()};w.appendChild(inp)}
}
function checkPIN(){const d=[...document.querySelectorAll('.pin-digit')].map(d=>d.value).join('');
  if(d.length===4){if(d==='1234'){document.getElementById('pin-overlay').classList.add('hidden');
    const pc=document.getElementById('parent-content');pc.classList.remove('hidden');pc.style.display='flex';renderParentStats()}
    else{document.getElementById('pin-err').textContent=t('pinWrong');document.getElementById('pin-err').classList.remove('hidden');
      document.querySelectorAll('.pin-digit').forEach(d=>d.value='');document.querySelector('.pin-digit')?.focus()}}}
function renderParentStats(){if(!curProfile)return;const s=Object.keys(progress).length,st=curProfile.totalStars||0;
  const accs=Object.values(progress).map(p=>p.accuracy).filter(Boolean),avg=accs.length?Math.round(accs.reduce((a,b)=>a+b,0)/accs.length):0;
  document.getElementById('st-songs').textContent=s;document.getElementById('st-stars').textContent=st;document.getElementById('st-acc').textContent=avg+'%'}

/* ════ SPEECH ════ */
function speak(txt){if(!('speechSynthesis' in window))return;const u=new SpeechSynthesisUtterance(txt);u.lang=LANG==='fr'?'fr-FR':'en-US';u.rate=.85;u.volume=.8;speechSynthesis.speak(u)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ================================================================
   PART 15 — EVENT LISTENERS
   ================================================================ */
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{
  const t=b.dataset.screen;showScreen(t);
  if(t==='screen-home')renderHome();if(t==='screen-settings')renderSettings();if(t==='screen-freeplay')buildPiano('fp-piano',3,2)}));
document.getElementById('lesson-back')?.addEventListener('click',()=>{Game.stop();showScreen('screen-home');renderHome()});
document.getElementById('fp-back')?.addEventListener('click',()=>showScreen('screen-home'));
document.querySelectorAll('.speed-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.speed-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');Game.setSpeed(b.dataset.speed)}));
let fpOct=3;
document.getElementById('oct-down')?.addEventListener('click',()=>{fpOct=Math.max(2,fpOct-1);document.getElementById('oct-disp').textContent=noteDisp('C'+fpOct);buildPiano('fp-piano',fpOct,2)});
document.getElementById('oct-up')?.addEventListener('click',()=>{fpOct=Math.min(6,fpOct+1);document.getElementById('oct-disp').textContent=noteDisp('C'+fpOct);buildPiano('fp-piano',fpOct,2)});
document.getElementById('hdr-parent')?.addEventListener('click',()=>{showScreen('screen-parent');initParent();document.querySelector('.pin-digit')?.focus()});
document.getElementById('btn-pback')?.addEventListener('click',()=>{document.getElementById('pin-overlay').classList.remove('hidden');document.getElementById('parent-content').classList.add('hidden');showScreen('screen-home')});
document.getElementById('btn-export')?.addEventListener('click',async()=>{const d={profiles:await Store.all('profiles'),progress:await Store.all('progress'),v:'1.0'};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='melodino-backup.json';a.click();URL.revokeObjectURL(u)});
document.getElementById('btn-import')?.addEventListener('click',()=>document.getElementById('import-file').click());
document.getElementById('import-file')?.addEventListener('change',async e=>{const f=e.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.profiles)for(const p of d.profiles)await Store.put('profiles',p);if(d.progress)for(const p of d.progress)await Store.put('progress',p);await loadProfiles();alert('Import OK!')}catch{alert('Fichier invalide')}});

// MIDI integration
MIDI.onOn.push(info=>{AudioEng.resume();onKey(info.full);highlightKey(info.full,'pressed')});
MIDI.onOff.push(info=>{offKey(info.full);highlightKey(info.full,null)});

/* ================================================================
   PART 16 — INIT
   ================================================================ */
document.getElementById('splash-btn')?.addEventListener('click',async()=>{
  await AudioEng.init();AudioEng.play('C4',300,60);setTimeout(()=>AudioEng.play('E4',300,60),150);setTimeout(()=>AudioEng.play('G4',500,60),300);
  await MIDI.init();
  document.getElementById('splash').style.opacity='0';setTimeout(()=>document.getElementById('splash').style.display='none',500);
  showScreen('screen-login')});
document.getElementById('splash')?.addEventListener('touchend',()=>document.getElementById('splash-btn')?.click(),{once:true});

(async()=>{await Store.init();await loadProfiles();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})})();
</script>
