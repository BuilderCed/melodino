<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Melodino 🎹</title>
  <meta name="description" content="Apprends le piano en t'amusant ! App gratuite, open-source, pour enfants 4-10 ans. Compatible ROLI LUMI.">
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Melodino">
  <link rel="manifest" href="_assets/manifest.json">
  <link rel="apple-touch-icon" href="_assets/icon-192.svg">
  <meta property="og:title" content="Melodino — Apprends le piano en t'amusant !">
  <meta property="og:description" content="App piano gamifiee pour enfants. Gratuite, open-source, multilingue, offline.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.11.0/dist/soundfont-player.min.js"></script>

<style>
/* ================================================================
   MELODINO v3 — Little Maestro structure + Neon Conservatory polish
   ================================================================ */

/* ── 1. CUSTOM PROPERTIES (Little Maestro palette, exact) ── */
:root {
  --bg: #0F0F1A;
  --surface: #1A1A2E;
  --surface-2: #22223C;
  --border: #2A2A4A;
  --border-soft: #1E1E38;

  --purple: #7C3AED;
  --purple-lt: #9D6EFF;
  --purple-dk: #5B21B6;
  --purple-glow: rgba(124,58,237,0.35);
  --purple-sub: rgba(124,58,237,0.12);

  --gold: #F59E0B;
  --gold-lt: #FBBF24;
  --gold-glow: rgba(245,158,11,0.35);
  --gold-sub: rgba(245,158,11,0.12);

  --green: #10B981;
  --green-lt: #34D399;
  --green-glow: rgba(16,185,129,0.35);

  --red: #EF4444;
  --red-glow: rgba(239,68,68,0.30);

  --text: #F8FAFC;
  --muted: #94A3B8;
  --dim: #4A5568;

  --note-C: #FF6B6B; --note-D: #FF9F43; --note-E: #FECA57;
  --note-F: #48DBFB; --note-G: #1DD1A1; --note-A: #A29BFE; --note-B: #FD79A8;

  --fh: 'Nunito', 'Arial Rounded MT Bold', system-ui, sans-serif;
  --fb: 'Inter', 'Helvetica Neue', system-ui, sans-serif;

  --r-xs: 6px; --r-sm: 12px; --r-md: 16px; --r-lg: 24px; --r-xl: 32px; --r-full: 9999px;
  --t-fast: 150ms ease-out; --t-std: 300ms ease-out; --t-cel: 600ms ease-out;
  --header-h: 64px; --nav-h: 68px;
}

/* ── 2. RESET + BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; font-size: 16px; }
body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--fb); font-size: 16px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
}
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }
::-webkit-scrollbar-thumb:hover { background: var(--purple); }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

/* ── 3. BUTTONS (Little Maestro sizes + Stitch gradients) ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-family: var(--fh); font-weight: 700; font-size: 16px; line-height: 1;
  border: none; border-radius: var(--r-full); cursor: pointer;
  padding: 13px 28px; white-space: nowrap; user-select: none;
  position: relative; overflow: hidden; touch-action: manipulation;
  transition: transform var(--t-fast), box-shadow var(--t-std), background var(--t-fast);
}
.btn:active { transform: scale(0.97) translateY(1px); }
.btn:focus-visible { outline: 2px solid var(--purple-lt); outline-offset: 3px; }
.btn-p {
  background: linear-gradient(135deg, var(--purple), var(--purple-lt));
  color: #fff; box-shadow: 0 4px 16px var(--purple-glow), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-p:hover { box-shadow: 0 6px 24px var(--purple-glow); transform: translateY(-1px); }
.btn-s { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-s:hover { border-color: var(--purple); background: var(--purple-sub); transform: translateY(-1px); }
.btn-g { background: transparent; color: var(--muted); }
.btn-g:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.btn-gold { background: var(--gold); color: #1A1005; box-shadow: 0 4px 16px var(--gold-glow); font-size: 17px; }
.btn-gold:hover { background: var(--gold-lt); box-shadow: 0 6px 24px var(--gold-glow); transform: translateY(-1px); }
.btn-xl { font-size: 19px; padding: 18px 40px; }
.btn-lg { font-size: 17px; padding: 15px 34px; }
.btn-sm { font-size: 13px; padding: 8px 18px; }
.btn-icon { padding: 10px; border-radius: var(--r-sm); min-width: 48px; min-height: 48px; display: flex; align-items: center; justify-content: center; }

/* ── 4. BADGES (Little Maestro exact) ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--r-full); font-family: var(--fh); font-weight: 700; font-size: 12px; }
.badge-purple { background: var(--purple-sub); color: var(--purple-lt); border: 1px solid rgba(124,58,237,0.25); }
.badge-gold { background: var(--gold-sub); color: var(--gold); border: 1px solid rgba(245,158,11,0.25); }
.badge-green { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }

/* ── 5. CARD (Little Maestro hover + Stitch glow) ── */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md); padding: 24px;
  transition: border-color var(--t-std), box-shadow var(--t-std);
}
.card:hover { border-color: var(--purple); box-shadow: 0 0 0 1px var(--purple), 0 8px 32px rgba(0,0,0,0.4); }

/* ── 6. PROGRESS BAR (Little Maestro exact + gradient) ── */
.pbar { height: 8px; background: var(--border); border-radius: var(--r-full); overflow: hidden; }
.pfill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-lt)); border-radius: var(--r-full); transition: width var(--t-std); box-shadow: 0 0 8px var(--purple-glow); }

/* ── 7. HEADER (Little Maestro layout + Stitch glassmorphism) ── */
.hdr {
  height: var(--header-h); flex-shrink: 0;
  background: rgba(26,26,46,0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border-soft);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.hdr-left { display: flex; align-items: center; gap: 8px; }
.hdr-av {
  width: 34px; height: 34px; border-radius: var(--r-full);
  background: var(--surface-2); border: 2.5px solid var(--purple);
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.hdr-name { font-family: var(--fh); font-weight: 700; font-size: 16px; }
.hdr-right { display: flex; align-items: center; gap: 16px; }
.hdr-stat { display: flex; align-items: center; gap: 5px; font-family: var(--fh); font-weight: 800; font-size: 15px; }
.hdr-stat.streak { color: #FF9500; }
.midi-pill { padding: 3px 10px; border-radius: var(--r-full); font-size: 12px; font-weight: 700; border: none; cursor: pointer; font-family: var(--fh); }
.midi-off { background: var(--surface-2); color: var(--dim); border: 1px solid var(--border); }
.midi-on { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
.hdr-lock { background: none; border: 1px solid var(--border); border-radius: var(--r-xs); color: var(--muted); cursor: pointer; padding: 6px 10px; font-size: 15px; transition: all var(--t-fast); }
.hdr-lock:hover { border-color: var(--purple); color: var(--purple-lt); background: var(--purple-sub); }

/* ── 8. BOTTOM NAV (Little Maestro exact + active glow) ── */
.nav {
  height: var(--nav-h); flex-shrink: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding: 6px 48px; z-index: 100;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 7px 18px; border-radius: var(--r-md); cursor: pointer;
  background: none; border: none; min-width: 70px;
  transition: background var(--t-fast);
}
.nav-btn .ico { font-size: 22px; transition: transform var(--t-fast); }
.nav-btn .lbl { font-family: var(--fh); font-weight: 700; font-size: 11px; color: var(--muted); transition: color var(--t-fast); }
.nav-btn.on { background: rgba(124,58,237,0.14); }
.nav-btn.on .lbl { color: var(--purple-lt); }
.nav-btn.on .ico { transform: scale(1.12); }
.nav-btn:not(.on):hover { background: rgba(255,255,255,0.04); }
.nav-btn:not(.on):hover .lbl { color: var(--text); }

/* ── 9. SCREENS ── */
.main { flex: 1; overflow: hidden; position: relative; }
.scr { display: none; position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; padding: 24px; min-height: 0; }
.scr.on { display: flex; flex-direction: column; }

/* ── 10. SPLASH (Little Maestro hero + Stitch particles) ── */
#splash {
  position: fixed; inset: 0; z-index: 999;
  background: linear-gradient(145deg, #1a0a2e 0%, #0d1a2e 50%, #0a1a0e 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.5s;
}
#splash::before { content: '♪'; position: absolute; top: 12%; left: 8%; font-size: 32px; color: rgba(162,155,254,0.35); pointer-events: none; animation: fl 5s ease-in-out infinite; }
#splash::after { content: '♫'; position: absolute; bottom: 18%; right: 10%; font-size: 40px; color: rgba(72,219,251,0.25); pointer-events: none; animation: fl 6s ease-in-out infinite 1.2s; }
@keyframes fl { 0%,100%{transform:translateY(0) rotate(0)} 33%{transform:translateY(-8px) rotate(3deg)} 66%{transform:translateY(-4px) rotate(-2deg)} }
#splash .logo { font-size: 72px; filter: drop-shadow(0 0 24px rgba(124,58,237,0.5)); animation: bob 2.5s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
#splash h1 { font-family: var(--fh); font-weight: 900; font-size: clamp(28px, 5vw, 48px); letter-spacing: -1px;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
#splash .tagline { font-size: 18px; color: #9090b0; max-width: 420px; text-align: center; line-height: 1.6; }
#splash .sub { color: var(--dim); font-size: 13px; margin-top: 12px; }

/* ── 11. LOGIN (Little Maestro avatar cards) ── */
#login { justify-content: center; align-items: center; gap: 24px;
  background: radial-gradient(ellipse 80% 60% at 50% -5%, rgba(124,58,237,0.18), transparent 70%),
              radial-gradient(ellipse 40% 40% at 10% 90%, rgba(124,58,237,0.06), transparent 60%), var(--bg); }
.av-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; width: 100%; max-width: 540px; }
.av-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
  padding: 24px 16px; text-align: center; cursor: pointer;
  transition: border-color var(--t-std), box-shadow var(--t-std), transform var(--t-fast);
}
.av-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.av-em { font-size: 40px; display: block; margin-bottom: 8px; }
.av-nm { font-family: var(--fh); font-weight: 700; font-size: 15px; }
.av-st { font-size: 12px; color: var(--gold); margin-top: 4px; }
.av-add { border-style: dashed; } .av-add .av-em { opacity: 0.5; }

/* ── 12. HOME / QUEST MAP ── */
#home { gap: 24px; align-items: center; }
.w-sec { width: 100%; max-width: 600px; }
.w-ban { display: flex; align-items: center; gap: 16px; padding: 16px 24px; border-radius: var(--r-md); font-family: var(--fh); font-weight: 800; font-size: 18px; margin-bottom: 12px; }
.w-ban.locked { opacity: 0.4; filter: grayscale(0.8); }
.w1 { background: linear-gradient(135deg, #3D5A3E, #2A3F2B); border: 1px solid #5A7C5B; }
.w2 { background: linear-gradient(135deg, #1E2E4A, #0F1A2E); border: 1px solid #2D4A7A; }
.w3 { background: linear-gradient(135deg, #3D1E3D, #261226); border: 1px solid #6B2D6B; }
.w4 { background: linear-gradient(135deg, #3A2200, #201200); border: 1px solid #7A5000; }
.s-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.s-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: 16px; cursor: pointer; transition: border-color var(--t-fast), transform var(--t-fast);
}
.s-card:hover { border-color: var(--purple); transform: translateY(-1px); }
.s-title { font-family: var(--fh); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.s-meta { font-size: 12px; color: var(--muted); } .s-stars { margin-top: 6px; }

/* ── 13. LESSON (HUD + Canvas + Piano) ── */
#lesson { padding: 0; flex-direction: column; }
.l-hud { display: flex; align-items: center; gap: 12px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.l-score { font-family: var(--fh); font-weight: 900; font-size: 20px; min-width: 50px; }
.l-streak { color: var(--gold); font-family: var(--fh); font-weight: 700; }
.l-bar { flex: 1; }
.l-canvas { flex: 1; position: relative; background: var(--bg); overflow: hidden; }
.l-canvas canvas { width: 100%; height: 100%; display: block; }
.spd { display: flex; gap: 6px; position: absolute; top: 12px; right: 12px; z-index: 5;
  background: rgba(30,30,45,0.5); backdrop-filter: blur(10px); padding: 5px; border-radius: var(--r-full); border: 1px solid rgba(42,42,74,0.25); }
.spd button { font-size: 18px; width: 38px; height: 38px; background: none; border: none; border-radius: 50%; cursor: pointer; color: var(--text); transition: all 0.15s; }
.spd button:hover { background: rgba(255,255,255,0.06); }
.spd button.on { background: rgba(124,58,237,0.2); border: 2px solid var(--purple); box-shadow: 0 0 12px rgba(189,157,255,0.3); }

/* ── 14. PIANO (Stitch "Neon Conservatory" keys) ── */
.pw { width: 100%; flex-shrink: 0; }
.piano {
  display: flex; position: relative; height: 160px;
  background: linear-gradient(180deg, var(--surface), var(--surface-2));
  border-top: 2px solid var(--purple); user-select: none; touch-action: manipulation;
  box-shadow: 0 -6px 20px rgba(0,0,0,0.4);
}
.wk {
  flex: 1; background: linear-gradient(to bottom, #ffffff 0%, #f3f0e8 80%, #e5e0d4 100%);
  border-right: 1px solid rgba(0,0,0,0.05); border-radius: 0 0 6px 6px;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  padding-bottom: 10px; font-family: var(--fh); font-size: 10px; color: #999; font-weight: 700;
  text-transform: uppercase; cursor: pointer; position: relative; z-index: 1;
  box-shadow: inset 0 -4px 4px rgba(0,0,0,0.1), 1px 0 0 rgba(0,0,0,0.05);
  transition: background 0.08s, transform 0.05s;
}
.wk:active, .wk.hit { background: var(--purple); color: #fff; transform: translateY(2px); box-shadow: 0 0 15px var(--purple-glow); }
.wk.ok { background: var(--green); color: #fff; box-shadow: 0 0 20px var(--green-glow); }
.wk.bad { background: var(--red); color: #fff; animation: shk 0.3s; }
.wk.nxt { background: rgba(248,160,16,0.1); color: var(--gold);
  box-shadow: 0 0 0 0 rgba(248,160,16,0.7), inset 0 0 15px rgba(248,160,16,0.3);
  animation: pgold 2s infinite; }
@keyframes pgold {
  0%{box-shadow:0 0 0 0 rgba(248,160,16,0.7),inset 0 0 15px rgba(248,160,16,0.3)}
  70%{box-shadow:0 0 0 16px rgba(248,160,16,0),inset 0 0 25px rgba(248,160,16,0.6)}
  100%{box-shadow:0 0 0 0 rgba(248,160,16,0),inset 0 0 15px rgba(248,160,16,0.3)}
}
@keyframes shk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 75%{transform:translateX(3px)} }
.bk {
  position: absolute; top: 0; width: 8%; height: 62%;
  background: linear-gradient(180deg, #333 0%, #111 100%);
  z-index: 2; border-radius: 0 0 4px 4px; cursor: pointer;
  box-shadow: inset 0 2px 2px rgba(255,255,255,0.15), 2px 4px 6px rgba(0,0,0,0.5);
  transition: background 0.08s, transform 0.05s;
}
.bk::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: rgba(255,255,255,0.05); border-radius: 4px 4px 0 0; }
.bk:active, .bk.hit { background: var(--purple); transform: translateY(2px); }
.bk.ok { background: var(--green); } .bk.bad { background: var(--red); animation: shk 0.3s; }
.bk.nxt { background: var(--gold); animation: pgold 2s infinite; }

/* ── 15. FREE PLAY ── */
#freeplay { padding: 0; flex-direction: column; }
.fp-bar { display: flex; align-items: center; gap: 16px; padding: 10px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }
.fp-oct { font-family: var(--fh); font-weight: 800; font-size: 20px; }
.fp-piano { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }

/* ── 16. SETTINGS ── */
#settings { gap: 20px; align-items: center; }
.st-grp { width: 100%; max-width: 480px; }
.st-title { font-family: var(--fh); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); }
.st-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); margin-bottom: 6px; transition: border-color var(--t-fast); }
.st-row:hover { border-color: var(--purple); }
.st-lbl { font-weight: 600; font-size: 14px; }
.tgl { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
.tgl input { opacity: 0; width: 0; height: 0; }
.tgl-t { position: absolute; inset: 0; background: var(--border); border-radius: var(--r-full); cursor: pointer; transition: background 0.2s; }
.tgl-t::after { content: ''; position: absolute; left: 3px; top: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.tgl input:checked + .tgl-t { background: var(--purple); }
.tgl input:checked + .tgl-t::after { transform: translateX(18px); }
input[type="range"] { -webkit-appearance: none; width: 110px; height: 6px; background: var(--border); border-radius: var(--r-full); }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--purple); border-radius: 50%; cursor: pointer; }
.st-sel { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 7px 12px; font-family: var(--fb); font-size: 14px; }

/* ── 17. PARENT ── */
#parent { gap: 24px; align-items: center; }
.pin-ov { position: absolute; inset: 0; background: var(--bg); z-index: 20; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
.pin-d { width: 48px; height: 56px; text-align: center; font-size: 26px; font-family: var(--fh); font-weight: 800; background: var(--surface); border: 2px solid var(--border); border-radius: var(--r-sm); color: var(--text); }
.pin-d:focus { border-color: var(--purple); outline: none; box-shadow: 0 0 0 3px var(--purple-sub); }
.st-num { font-family: var(--fh); font-weight: 900; font-size: 32px; color: var(--purple); }
.st-lab { font-size: 12px; color: var(--muted); }

/* ── 18. CELEBRATION (Little Maestro overlay + Stitch pop) ── */
.cel { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; }
.cel.on { display: flex; }
.cel-c { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 48px 24px; text-align: center; max-width: 400px; width: 90%; animation: pop 0.5s ease-out; }
@keyframes pop { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
.cel-em { font-size: 64px; margin-bottom: 16px; }
.cel-t { font-family: var(--fh); font-weight: 900; font-size: 28px; margin-bottom: 8px; }
.cel-s { color: var(--muted); margin-bottom: 24px; }
.cel-st { font-size: 40px; margin-bottom: 24px; }

.hidden { display: none !important; }

/* ── 19. RESPONSIVE (Little Maestro breakpoints) ── */
@media (max-width: 600px) { .piano { height: 120px; } .wk { font-size: 9px; padding-bottom: 6px; } :root { --header-h: 52px; --nav-h: 56px; } }

const T={fr:{who:'Qui joue aujourd\'hui ?',add:'Ajouter',bravo:'Bravo !',fantastic:'Fantastique !',almost:'Presque !',correct:'correct',score:'Score',back:'Retour',world:'Monde',locked:'Verrouillé',need:'Il faut {n} étoiles',w1:'Premiers pas',w2:'Deux mains',w3:'Plus de notes',w4:'Classiques',pin_wrong:'Code incorrect',disconnected:'Non connecté'},
en:{who:'Who\'s playing?',add:'Add',bravo:'Bravo!',fantastic:'Fantastic!',almost:'Almost!',correct:'correct',score:'Score',back:'Back',world:'World',locked:'Locked',need:'Need {n} stars',w1:'First steps',w2:'Two hands',w3:'More notes',w4:'Classics',pin_wrong:'Wrong PIN',disconnected:'Disconnected'}};
let LG=navigator.language.startsWith('en')?'en':'fr';
function t(k,v){let s=T[LG]?.[k]||T.fr[k]||k;if(v)Object.entries(v).forEach(([a,b])=>{s=s.replace(`{${a}}`,b)});return s}
const SOL={C:'Do',D:'Ré',E:'Mi',F:'Fa',G:'Sol',A:'La',B:'Si'};
function nd(n){const l=n.replace(/[0-9#b]/g,''),r=n.replace(l,'');return LG==='fr'&&SOL[l]?SOL[l]+r:n}

/* ================================================================
   PART 1 — LUMI SYSEX (complete, from xivilay/lumi-web-control)
   ================================================================ */
const Lumi=(()=>{
  const ck=v=>{let s=v.length;for(let i=0;i<v.length;i++)s=(s*3+v[i])&0xff;return s&0x7f};
  function BA(){this.v=[];this.n=0;
    this.a=function(val,sz=7){let u=this.n%7,p=0;if(u>0){p=this.v[this.v.length-1];this.v.pop()}this.n+=sz;while(sz>0){p|=(val<<u)&127;sz-=(7-u);val>>=(7-u);this.v.push(p);p=0;u=0}};
    this.g=function(){while(this.v.length<8)this.v.push(0);return this.v}}
  const H=[0xF0,0x00,0x21,0x10],D=0x37;
  function send(o,c){if(!o)return;try{o.send([...H,0x77,D,...c,ck(c),0xF7])}catch{}}
  function color(id,hex){const c=parseInt(hex.replace('#',''),16),r=(c>>16)&0xFF,g=(c>>8)&0xFF,b=c&0xFF;const ba=new BA();ba.a(0x10,7);ba.a(0x20+0x10*(id&1),7);ba.a(0b00100,5);ba.a(b,8);ba.a(g,8);ba.a(r,8);ba.a(0xFF,8);return ba.g()}
  function bright(v){const b=new BA();b.a(0x10,7);b.a(0x40,7);b.a(0b00100,5);b.a(v,7);return b.g()}
  function octave(v){const b=new BA();b.a(0x10,7);b.a(0x40,7);b.a(0b00000,5);b.a(v,32);return b.g()}
  function cmode(v){const b=new BA();b.a(0x10,7);b.a(0x40,7);b.a(0b00010,5);b.a(v&3,2);return b.g()}
  const sc={'Major':[0x02,0x00],'Minor':[0x22,0x00],'Chromatic':[0x42,0x04]};
  function scale(n){return[0x10,0x60,...(sc[n]||sc.Major),0,0,0,0]}
  const km={'C':[0x03,0x00],'D':[0x43,0x00],'E':[0x03,0x01],'F':[0x23,0x01],'G':[0x63,0x01],'A':[0x23,0x02],'B':[0x63,0x02]};
  function key(n){return[0x10,0x30,...(km[n]||km.C),0,0,0,0]}
  return{send,color,bright,octave,cmode,scale,key}
})();

/* ================================================================
   PART 2 — AUDIO (soundfont-player + fallback)
   ================================================================ */
const Aud=(()=>{
  let ctx,piano,ok=false;
  const FR={};['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'].forEach((n,i)=>{for(let o=2;o<=7;o++){FR[n+o]=440*Math.pow(2,((o+1)*12+i-69)/12)}});
  async function init(){
    ctx=new(window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    if(ctx.state==='suspended')await ctx.resume();
    try{piano=await Soundfont.instrument(ctx,'acoustic_grand_piano',{soundfont:'MusyngKite',format:'mp3'});ok=true}catch{ok=false}
  }
  function resume(){if(ctx&&ctx.state==='suspended')ctx.resume()}
  function play(n,dur=800,vel=80){
    if(!ctx)return;resume();
    if(ok&&piano){piano.play(n,ctx.currentTime,{gain:vel/127,duration:dur/1000});return}
    const f=FR[n];if(!f)return;const v=(vel/127)*0.4,now=ctx.currentTime;
    const o=ctx.createOscillator(),e=ctx.createGain();o.type='triangle';o.frequency.value=f;
    e.gain.setValueAtTime(0,now);e.gain.linearRampToValueAtTime(v,now+0.015);e.gain.exponentialRampToValueAtTime(0.001,now+dur/1000);
    o.connect(e);e.connect(ctx.destination);o.start(now);o.stop(now+dur/1000+0.1);
  }
  function inst(n,vel=90){play(n,1200,vel)}
  function vol(v){}
  return{init,resume,play,inst,vol,ok:()=>ok}
})();

/* ================================================================
   PART 3 — MIDI
   ================================================================ */
const Mid=(()=>{
  let acc,inp,out,dn,lumi=false;const onN=[],offN=[];
  const NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  function m2n(n){return{note:NN[n%12],oct:Math.floor(n/12)-1,full:NN[n%12]+(Math.floor(n/12)-1),midi:n}}
  function hm(e){const[s,n,v]=e.data,c=s&0xF0,i=m2n(n);if(c===0x90&&v>0)onN.forEach(cb=>cb({...i,vel:v}));else if(c===0x80||(c===0x90&&v===0))offN.forEach(cb=>cb({...i,vel:0}))}
  async function init(){
    if(!navigator.requestMIDIAccess)return;
    try{acc=await navigator.requestMIDIAccess({sysex:true})}catch{try{acc=await navigator.requestMIDIAccess({sysex:false})}catch{return}}
    acc.onstatechange=()=>scan();scan();
  }
  function scan(){
    if(!acc)return;let best=null;lumi=false;out=null;
    for(const i of acc.inputs.values()){if(i.name.toLowerCase().includes('lumi')){best=i;lumi=true;break}}
    if(!best){const f=acc.inputs.values().next().value;if(f)best=f}
    for(const o of acc.outputs.values()){if(o.name.toLowerCase().includes('lumi')){out=o;break}}
    if(best){if(inp)inp.onmidimessage=null;inp=best;inp.onmidimessage=hm;dn=best.name;
      if(lumi&&out){setTimeout(()=>{Lumi.send(out,Lumi.octave(0));Lumi.send(out,Lumi.cmode(1));Lumi.send(out,Lumi.color(0,'#7C3AED'));Lumi.send(out,Lumi.bright(80));Lumi.send(out,Lumi.scale('Major'));Lumi.send(out,Lumi.key('C'))},300)}
    }else{inp=null;dn=null}upill()}
  function upill(){const p=document.getElementById('mpill');if(!p)return;if(dn){p.className='midi-pill midi-on';p.textContent='🎹 '+(lumi?'LUMI':dn)}else{p.className='midi-pill midi-off';p.textContent='🎹 '+t('disconnected')}}
  return{init,onN,offN,out:()=>out,lumi:()=>lumi,upill}
})();

  function init(){return new Promise(r=>{if(!indexedDB){r();return}const q=indexedDB.open(N,V);q.onupgradeneeded=e=>{const d=e.target.result;['profiles','progress','settings'].forEach(s=>{if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='progress'?'key':'id'})})};q.onsuccess=e=>{db=e.target.result;r()};q.onerror=()=>r()})}
  function tx(s,m){return db.transaction(s,m).objectStore(s)}
  function get(s,k){if(!db)return Promise.resolve(null);return new Promise(r=>{const q=tx(s,'readonly').get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>r(null)})}
  function put(s,v){if(!db)return Promise.resolve();return new Promise(r=>{tx(s,'readwrite').put(v);r()})}
  function all(s){if(!db)return Promise.resolve([]);return new Promise(r=>{const q=tx(s,'readonly').getAll();q.onsuccess=()=>r(q.result||[]);q.onerror=()=>r([])})}
  return{init,get,put,all}
})();

/* ================================================================
   PART 6 — GAME ENGINE
   ================================================================ */
const Game=(()=>{
  let cv,cx,song,spd='normal',ni=0,sc=0,stk=0,cor=0,tot=0,run=false,notes=[];
  function init(){cv=document.getElementById('cv');cx=cv.getContext('2d')}
  function start(s,sp='normal'){
    song=s;spd=sp;ni=0;sc=0;stk=0;cor=0;tot=0;notes=[];run=true;
    const w=cv.parentElement;cv.width=w.clientWidth*devicePixelRatio;cv.height=w.clientHeight*devicePixelRatio;cx.scale(devicePixelRatio,devicePixelRatio);
    const bpm=s.bpm[spd]||s.bpm.normal,beat=60000/bpm;let el=0;
    s.n.forEach((nt,i)=>{const d=(DUR[nt.du]||1)*beat;notes.push({note:nt.n,y:0,dur:d,hit:false,idx:i});el+=d});
    if(Mid.lumi()){const o=Mid.out();Lumi.send(o,Lumi.key(s.k||'C'));Lumi.send(o,Lumi.scale(s.s||'Major'));Lumi.send(o,Lumi.cmode(1));Lumi.send(o,Lumi.color(0,'#7C3AED'))}
    hud();requestAnimationFrame(loop);
  }
  let lt=0;
  function loop(ts){
    if(!run)return;const dt=Math.min(ts-(lt||ts),50)/1000;lt=ts;
    const w=cv.width/devicePixelRatio,h=cv.height/devicePixelRatio,hy=h*0.85;
    cx.clearRect(0,0,w,h);
    /* Hit line with Stitch glow */
    cx.shadowColor='rgba(189,157,255,0.4)';cx.shadowBlur=20;
    cx.strokeStyle='rgba(189,157,255,0.3)';cx.lineWidth=2;cx.beginPath();cx.moveTo(0,hy);cx.lineTo(w,hy);cx.stroke();
    cx.shadowBlur=0; /* Reset shadow for notes */
    const sm={turtle:0.6,normal:1,rabbit:1.4,rocket:1.8}[spd]||1;
    const nc={C:'#FF6B6B',D:'#FF9F43',E:'#FECA57',F:'#48DBFB',G:'#1DD1A1',A:'#A29BFE',B:'#FD79A8'};
    notes.forEach(fn=>{
      if(!fn.hit)fn.y+=150*sm*dt;
      if(!fn.hit&&fn.idx===ni)fn.y=hy-12;
      const kp={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[fn.note.replace(/[0-9#b]/g,'')]||0;
      const nw=Math.max(w/14,28),x=(kp/14)*w;
      if(fn.y>-24&&fn.y<h+24){
        const clr=fn.hit?'rgba(16,185,129,0.4)':(nc[fn.note.replace(/[0-9#b]/g,'')]||'#7C3AED');
        /* Stitch: note glow (drop-shadow effect) */
        cx.shadowColor=clr;cx.shadowBlur=fn.idx===ni?16:8;
        cx.fillStyle=fn.hit?clr+'66':clr+'cc';
        const nh=fn.idx===ni?26:22;const nww=fn.idx===ni?nw:nw-4;
        cx.beginPath();cx.roundRect(fn.idx===ni?x:x+2,fn.y,nww,nh,6);cx.fill();
        cx.shadowBlur=0;
        cx.fillStyle='#fff';cx.font=fn.idx===ni?'800 13px Nunito':'700 11px Nunito';cx.textAlign='center';
        cx.fillText(nd(fn.note),x+nw/2,fn.y+(fn.idx===ni?17:15));
      }
    });
    if(ni>=song.n.length){run=false;end();return}
    requestAnimationFrame(loop);
  }
  function input(note){
    if(!run||ni>=song.n.length)return;
    const exp=song.n[ni],fn=notes[ni];
    if(note===exp.n){fn.hit=true;cor++;tot++;stk++;sc+=10+stk;ni++;hl(note,'ok');
      if(Mid.lumi()&&stk>10)Lumi.send(Mid.out(),Lumi.color(0,stk>20?'#F59E0B':'#10B981'));
      setTimeout(()=>{clr();if(ni<song.n.length)hl(song.n[ni].n,'nxt')},200);
    }else{tot++;stk=0;hl(note,'bad');
      if(Mid.lumi()){Lumi.send(Mid.out(),Lumi.color(0,'#EF4444'));setTimeout(()=>Lumi.send(Mid.out(),Lumi.color(0,'#7C3AED')),200)}
      setTimeout(()=>clr(),300);
    }
    hud();
  }
  function hud(){
    document.getElementById('lsc').textContent=sc;
    document.getElementById('lstr').textContent='🔥 '+stk;
    if(song)document.getElementById('lfill').style.width=Math.round(ni/song.n.length*100)+'%';
  }
  function end(){
    if(Mid.lumi()){const o=Mid.out();Lumi.send(o,Lumi.cmode(0));setTimeout(()=>Lumi.send(o,Lumi.cmode(1)),3000)}
    clr();const acc=tot>0?Math.round(cor/tot*100):0;const stars=acc>=95?3:acc>=80?2:1;
    saveProg(song.id,stars,acc,sc);showCel(stars,acc,sc);
  }
  function setSpd(s){spd=s}
  function stop(){run=false;clr();if(Mid.lumi())Lumi.send(Mid.out(),Lumi.color(0,'#7C3AED'))}
  return{init,start,input,setSpd,stop}
})();

/* ================================================================
   PART 7 — PIANO BUILDER
   ================================================================ */
function mkPiano(id,so=4,no=2){
  const el=document.getElementById(id);if(!el)return;el.innerHTML='';
  const W=['C','D','E','F','G','A','B'],B={C:'C#',D:'D#',F:'F#',G:'G#',A:'A#'},BO={C:.65,D:1.75,F:3.6,G:4.7,A:5.8};
  for(let o=so;o<so+no;o++){const oo=(o-so)*7;
    W.forEach((n,i)=>{
      const k=document.createElement('div');k.className='wk';k.dataset.n=n+o;k.textContent=nd(n+o);
      k.addEventListener('pointerdown',e=>{e.preventDefault();keyOn(n+o)});
      k.addEventListener('pointerup',()=>keyOff(n+o));
      el.appendChild(k);
      if(B[n]){const bk=document.createElement('div');bk.className='bk';bk.dataset.n=B[n]+o;
        bk.style.left=((oo+BO[n])/(no*7))*100+'%';
        bk.addEventListener('pointerdown',e=>{e.preventDefault();keyOn(B[n]+o)});
        bk.addEventListener('pointerup',()=>keyOff(B[n]+o));
        el.appendChild(bk)}
    })}
}
function keyOn(n){Aud.resume();Aud.inst(n);if(document.querySelector('.scr.on')?.id==='lesson')Game.input(n)}
function keyOff(n){}
function hl(n,s){document.querySelectorAll(`[data-n="${n}"]`).forEach(k=>{k.classList.remove('ok','bad','nxt','hit');if(s)k.classList.add(s)})}
function clr(){document.querySelectorAll('.wk,.bk').forEach(k=>k.classList.remove('ok','bad','nxt','hit'))}

/* ════ AZERTY ════ */
const AZ={'w':'C3','x':'D3','c':'E3','v':'F3','b':'G3','n':'A3',',':'B3','q':'C4','s':'D4','d':'E4','f':'F4','g':'G4','h':'A4','j':'B4','k':'C5','l':'D5','m':'E5','z':'C#3','e':'D#3','t':'F#3','y':'G#3','u':'A#3','a':'C#4'};
const dn=new Set();
document.addEventListener('keydown',e=>{if(e.repeat||e.target.tagName==='INPUT')return;const n=AZ[e.key.toLowerCase()];if(n&&!dn.has(e.key)){dn.add(e.key);keyOn(n);hl(n,'hit')}if(e.key==='Escape')show('home')});
document.addEventListener('keyup',e=>{dn.delete(e.key);const n=AZ[e.key.toLowerCase()];if(n)hl(n,null)});

/* ================================================================
   PART 8 — PROFILES + PROGRESSION
   ================================================================ */
let cur=null,profs=[],prog={};
async function loadP(){profs=await DB.all('profiles');rLogin()}
function rLogin(){
  const g=document.getElementById('avg');g.innerHTML='';
  profs.forEach(p=>{const c=document.createElement('div');c.className='av-card';
    c.innerHTML=`<span class="av-em">${p.av}</span><span class="av-nm">${esc(p.nm)}</span><div class="av-st">⭐ ${p.ts||0}</div>`;
    c.onclick=()=>selP(p);g.appendChild(c)});
  if(profs.length<6){const a=document.createElement('div');a.className='av-card av-add';
    a.innerHTML=`<span class="av-em">➕</span><span class="av-nm">${t('add')}</span>`;
    a.onclick=newP;g.appendChild(a)}
}
const AVS=['🐱','🐶','🐰','🦊','🐻','🐼','🐨','🦁','🐸','🦄','🐙','🦋','🐢','🦜','🐬','🦉','🐝','🦩','🐳','🦘'];
function newP(){const nm=prompt('Prénom ?');if(!nm?.trim())return;const age=parseInt(prompt('Âge ?'))||6;
  const p={id:Date.now()+'',nm:nm.trim().slice(0,20),av:AVS[Math.floor(Math.random()*AVS.length)],age:Math.max(3,Math.min(12,age)),ts:0,sk:0,ld:null};
  DB.put('profiles',p).then(()=>{profs.push(p);rLogin()})}
async function selP(p){
  cur=p;prog={};(await DB.all('progress')).filter(r=>r.key.startsWith(p.id+'_')).forEach(r=>{prog[r.sid]=r});
  document.getElementById('hav').textContent=p.av;document.getElementById('hnm').textContent=p.nm;
  document.getElementById('hsk').textContent=p.sk||0;
  show('home');rHome();speak('Bonjour '+p.nm+' !')}
async function saveProg(sid,stars,acc,sc){
  if(!cur)return;const k=cur.id+'_'+sid,ex=prog[sid],best=ex?Math.max(ex.stars,stars):stars;
  prog[sid]={key:k,sid,stars:best,acc,sc,dt:new Date().toISOString()};await DB.put('progress',prog[sid]);
  let ts=0;Object.values(prog).forEach(p=>ts+=p.stars);cur.ts=ts;await DB.put('profiles',cur)}

/* ════ HOME ════ */
function rHome(){
  const w=document.getElementById('hw');w.innerHTML='';const ts=cur?.ts||0;
  WORLDS.forEach(wo=>{
    const ok=ts>=wo.req;const s=document.createElement('div');s.className='w-sec';
    const b=document.createElement('div');b.className=`w-ban ${wo.cl} ${ok?'':'locked'}`;
    b.innerHTML=`<span style="font-size:22px">${wo.ic}</span> ${t(wo.nm)}`;
    if(!ok)b.innerHTML+=` <span style="font-size:11px;margin-left:auto;opacity:.6">${t('need',{n:wo.req})}</span>`;
    s.appendChild(b);
    if(ok){const g=document.createElement('div');g.className='s-grid';
      SONGS.filter(sg=>sg.w===wo.id).forEach(sg=>{const sp=prog[sg.id];
        const c=document.createElement('div');c.className='s-card';
        c.innerHTML=`<div class="s-title">${esc(sg.t)}</div><div class="s-meta">${sg.c}</div><div class="s-stars">${sp?'⭐'.repeat(sp.stars)+'☆'.repeat(3-sp.stars):'☆☆☆'}</div>`;
        c.onclick=()=>startL(sg);g.appendChild(c)});s.appendChild(g)}
    w.appendChild(s)})}
function startL(song){show('lesson');mkPiano('lp',3,2);Game.init();Game.start(song);if(song.n.length)hl(song.n[0].n,'nxt');speak(song.t)}

/* ════ CELEBRATION ════ */
function showCel(stars,acc,sc){
  document.getElementById('cem').textContent=stars>=3?'🌟':stars>=2?'⭐':'👏';
  document.getElementById('cet').textContent=stars>=3?t('fantastic'):stars>=2?t('bravo'):t('almost');
  document.getElementById('ces').textContent=`${acc}% ${t('correct')} — ${t('score')}: ${sc}`;
  document.getElementById('cst').textContent='⭐'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('cgo').onclick=()=>{document.getElementById('cel').classList.remove('on');show('home');rHome()};
  document.getElementById('cel').classList.add('on');speak(stars>=3?t('fantastic'):t('bravo'))}

/* ════ SCREENS ════ */
function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id)?.classList.add('on');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('on',b.dataset.s===id));
  const sh=id!=='login';document.getElementById('hdr').style.display=sh?'flex':'none';document.getElementById('nav').style.display=sh?'flex':'none';
  if(id!=='lesson')Game.stop()}

/* ════ SETTINGS ════ */
function rSet(){
  const w=document.getElementById('stw');w.innerHTML='';
  [{type:'select',lbl:'Langue',opts:[{v:'fr',l:'🇫🇷 Français'},{v:'en',l:'🇬🇧 English'}],cur:LG,fn:v=>{LG=v;rSet();rHome()}},
   {type:'range',lbl:'Volume',min:0,max:100,cur:70,fn:v=>Aud.vol(v/100)},
   {type:'toggle',lbl:'Mode daltonien',cur:false,fn:v=>document.body.classList.toggle('cb',v)},
   {type:'toggle',lbl:'Animations réduites',cur:false,fn:v=>document.body.classList.toggle('rm',v)},
   {type:'button',lbl:'Plein écran',fn:()=>{document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.()}}
  ].forEach(it=>{
    const r=document.createElement('div');r.className='st-row';r.innerHTML=`<span class="st-lbl">${it.lbl}</span>`;
    if(it.type==='select'){const s=document.createElement('select');s.className='st-sel';it.opts.forEach(o=>{const op=document.createElement('option');op.value=o.v;op.textContent=o.l;if(o.v===it.cur)op.selected=true;s.appendChild(op)});s.onchange=()=>it.fn(s.value);r.appendChild(s)}
    else if(it.type==='range'){const i=document.createElement('input');i.type='range';i.min=it.min;i.max=it.max;i.value=it.cur;i.oninput=()=>it.fn(+i.value);r.appendChild(i)}
    else if(it.type==='toggle'){const l=document.createElement('label');l.className='tgl';l.innerHTML=`<input type="checkbox" ${it.cur?'checked':''}><span class="tgl-t"></span>`;l.querySelector('input').onchange=e=>it.fn(e.target.checked);r.appendChild(l)}
    else if(it.type==='button'){const b=document.createElement('button');b.className='btn btn-s btn-sm';b.textContent=it.lbl;b.onclick=it.fn;r.appendChild(b)}
    w.appendChild(r)})}

/* ════ PARENT ════ */
function initPar(){const w=document.getElementById('piw');w.innerHTML='';for(let i=0;i<4;i++){const inp=document.createElement('input');inp.type='password';inp.maxLength=1;inp.className='pin-d';inp.inputMode='numeric';inp.oninput=e=>{if(e.target.value&&i<3)w.children[i+1].focus();chkPin()};inp.onkeydown=e=>{if(e.key==='Backspace'&&!e.target.value&&i>0)w.children[i-1].focus()};w.appendChild(inp)}}
function chkPin(){const d=[...document.querySelectorAll('.pin-d')].map(d=>d.value).join('');if(d.length===4){if(d==='1234'){document.getElementById('pov').classList.add('hidden');const c=document.getElementById('pcnt');c.classList.remove('hidden');c.style.display='flex';rPar()}else{document.getElementById('perr').textContent=t('pin_wrong');document.getElementById('perr').classList.remove('hidden');document.querySelectorAll('.pin-d').forEach(d=>d.value='');document.querySelector('.pin-d')?.focus()}}}
function rPar(){if(!cur)return;document.getElementById('ps1').textContent=Object.keys(prog).length;document.getElementById('ps2').textContent=cur.ts||0;const accs=Object.values(prog).map(p=>p.acc).filter(Boolean);document.getElementById('ps3').textContent=(accs.length?Math.round(accs.reduce((a,b)=>a+b,0)/accs.length):0)+'%'}

/* ════ SPEECH ════ */
let _fv=null;
function speak(txt){if(!('speechSynthesis' in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);
  if(!_fv){const vs=speechSynthesis.getVoices();_fv=vs.find(v=>v.name.includes('Amelie')||v.name.includes('Amélie'))||vs.find(v=>v.lang.startsWith('fr')&&v.localService)||vs.find(v=>v.lang.startsWith('fr'))}
  if(_fv)u.voice=_fv;u.lang=LG==='fr'?'fr-FR':'en-US';u.rate=0.85;u.pitch=1.1;u.volume=0.8;speechSynthesis.speak(u)}
if('speechSynthesis' in window)speechSynthesis.addEventListener('voiceschanged',()=>{_fv=null});
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

/* ════ EVENTS ════ */
document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{show(b.dataset.s);if(b.dataset.s==='home')rHome();if(b.dataset.s==='settings')rSet();if(b.dataset.s==='freeplay')mkPiano('fp',3,2)});
document.getElementById('lbk').onclick=()=>{Game.stop();show('home');rHome()};
document.getElementById('fbk').onclick=()=>show('home');
document.querySelectorAll('.spd button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.spd button').forEach(x=>x.classList.remove('on'));b.classList.add('on');Game.setSpd(b.dataset.s)});
let fpo=3;
document.getElementById('od').onclick=()=>{fpo=Math.max(2,fpo-1);document.getElementById('odisp').textContent=nd('C'+fpo);mkPiano('fp',fpo,2)};
document.getElementById('ou').onclick=()=>{fpo=Math.min(6,fpo+1);document.getElementById('odisp').textContent=nd('C'+fpo);mkPiano('fp',fpo,2)};
document.getElementById('hpar').onclick=()=>{show('parent');initPar();document.querySelector('.pin-d')?.focus()};
document.getElementById('pbk').onclick=()=>{document.getElementById('pov').classList.remove('hidden');document.getElementById('pcnt').classList.add('hidden');show('home')};
document.getElementById('bex').onclick=async()=>{const d={profiles:await DB.all('profiles'),progress:await DB.all('progress'),v:'2.0'};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='melodino-backup.json';a.click();URL.revokeObjectURL(u)};
document.getElementById('bim').onclick=()=>document.getElementById('ifile').click();
document.getElementById('ifile').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.profiles)for(const p of d.profiles)await DB.put('profiles',p);if(d.progress)for(const p of d.progress)await DB.put('progress',p);await loadP();alert('Import OK!')}catch{alert('Fichier invalide')}};
Mid.onN.push(i=>{Aud.resume();keyOn(i.full);hl(i.full,'hit')});
Mid.offN.push(i=>hl(i.full,null));

/* ════ SPLASH + INIT ════ */
document.getElementById('go').onclick=async()=>{
  await Aud.init();Aud.play('C4',300,60);setTimeout(()=>Aud.play('E4',300,60),150);setTimeout(()=>Aud.play('G4',500,60),300);
  await Mid.init();
  const sp=document.getElementById('splash');sp.style.opacity='0';setTimeout(()=>sp.style.display='none',500);
  show('login');
};

(async()=>{await DB.init();await loadP();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})})();
