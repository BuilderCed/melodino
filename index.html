  <style>
/* ================================================================
   PETIT MAESTRO — DESIGN SYSTEM v1.0
   ================================================================ */

/* ── 1. CSS CUSTOM PROPERTIES ───────────────────────────────────── */
:root {
  /* Colors — Dark theme (default) */
  --bg: #0F0F1A;
  --surface: #1A1A2E;
  --surface-2: #22223C;
  --border: #2A2A4A;
  --border-soft: #1E1E38;

  --purple: #7C3AED;
  --purple-light: #9D6EFF;
  --purple-dark: #5B21B6;
  --purple-glow: rgba(124,58,237,0.35);
  --purple-subtle: rgba(124,58,237,0.12);

  --gold: #F59E0B;
  --gold-light: #FBBF24;
  --gold-glow: rgba(245,158,11,0.35);

  --green: #10B981;
  --green-light: #34D399;

  --red: #EF4444;
  --red-glow: rgba(239,68,68,0.3);

  /* Color-blind safe (Okabe-Ito) */
  --cb-correct: #009E73;
  --cb-incorrect: #D55E00;
  --cb-next: #F0E442;
  --cb-active: #0072B2;

  /* Semantic aliases */
  --note-correct: var(--green);
  --note-incorrect: var(--red);
  --note-next: var(--gold);
  --note-active: var(--purple);

  --text: #F8FAFC;
  --text-muted: #94A3B8;
  --text-dim: #4A5568;

  --key-white: #F5F0E8;
  --key-black: #1A1A1A;

  /* Spacing */
  --sp-xs: 4px; --sp-sm: 8px; --sp-md: 16px; --sp-lg: 24px; --sp-xl: 48px;

  /* Typography */
  --font-h: 'Nunito', 'Arial Rounded MT Bold', system-ui, sans-serif;
  --font-b: 'Inter', 'Helvetica Neue', system-ui, sans-serif;

  /* Radius */
  --r-xs: 6px; --r-sm: 12px; --r-md: 16px; --r-lg: 24px; --r-full: 9999px;

  /* Transitions */
  --t-fast: 150ms ease-out;
  --t-std: 300ms ease-out;

  /* Layout */
  --header-h: 56px;
  --nav-h: 60px;
}

/* ── Light theme ────────────────────────────────────────────────── */
@media (prefers-color-scheme: light) {
  :root:not(.theme-dark) {
    --bg: #F8F9FC; --surface: #FFFFFF; --surface-2: #F1F3F9;
    --border: #E2E8F0; --border-soft: #EDF2F7;
    --text: #1A202C; --text-muted: #4A5568; --text-dim: #A0AEC0;
    --key-white: #FFFFFF; --key-black: #2D3748;
  }
}
.theme-light {
  --bg: #F8F9FC; --surface: #FFFFFF; --surface-2: #F1F3F9;
  --border: #E2E8F0; --border-soft: #EDF2F7;
  --text: #1A202C; --text-muted: #4A5568; --text-dim: #A0AEC0;
  --key-white: #FFFFFF; --key-black: #2D3748;
}

/* ── Color-blind mode ───────────────────────────────────────────── */
.colorblind-mode {
  --note-correct: var(--cb-correct);
  --note-incorrect: var(--cb-incorrect);
  --note-next: var(--cb-next);
  --note-active: var(--cb-active);
}

/* ── Reduced motion ─────────────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
.reduced-motion *, .reduced-motion *::before, .reduced-motion *::after {
  animation-duration: 0.01ms !important; transition-duration: 0.01ms !important;
}

/* ── Dyslexia font ──────────────────────────────────────────────── */
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/npm/open-dyslexic@1.0.3/woff/OpenDyslexic-Regular.woff') format('woff');
  font-weight: 400; font-display: swap;
}
.dyslexia-mode { --font-b: 'OpenDyslexic', sans-serif; --font-h: 'OpenDyslexic', sans-serif; }
.dyslexia-mode * { letter-spacing: 0.05em; word-spacing: 0.1em; line-height: 1.8; }

/* ── Focus mode (ADHD) ──────────────────────────────────────────── */
.focus-mode .celebration-overlay,
.focus-mode .badge,
.focus-mode .streak-badge,
.focus-mode .confetti { display: none !important; }
.focus-mode { --bg: #0a0a12; }

/* ── 2. RESET + BASE ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; font-size: 16px; scroll-behavior: smooth; }
body {
  height: 100%; width: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font-b); font-size: 16px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--r-full); }

/* ── 3. TYPOGRAPHY ──────────────────────────────────────────────── */
.t-h { font-family: var(--font-h); font-weight: 800; line-height: 1.2; }
.t-label { font-family: var(--font-h); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); }

/* ── 4. BUTTONS ─────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: var(--sp-sm);
  font-family: var(--font-h); font-weight: 700; font-size: 16px; line-height: 1;
  border: none; border-radius: var(--r-full); cursor: pointer;
  padding: 13px 28px; text-decoration: none; white-space: nowrap; user-select: none;
  transition: transform var(--t-fast), box-shadow var(--t-std), background var(--t-fast);
  touch-action: manipulation;
}
.btn:active { transform: scale(0.97); }
.btn:focus-visible { outline: 2px solid var(--purple-light); outline-offset: 3px; }
.btn-primary { background: var(--purple); color: #fff; box-shadow: 0 4px 16px var(--purple-glow); }
.btn-primary:hover { background: var(--purple-light); transform: translateY(-1px); }
.btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--purple); background: var(--purple-subtle); }
.btn-ghost { background: transparent; color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.btn-gold { background: var(--gold); color: #1A1005; box-shadow: 0 4px 16px var(--gold-glow); }
.btn-sm { font-size: 13px; padding: 8px 18px; }
.btn-lg { font-size: 18px; padding: 16px 36px; }
.btn-icon { padding: 10px; border-radius: var(--r-sm); min-width: 48px; min-height: 48px; }

/* ── 5. CARDS & SURFACES ────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
  padding: var(--sp-lg); transition: border-color var(--t-std), box-shadow var(--t-std);
}
.card:hover { border-color: var(--purple); box-shadow: 0 0 0 1px var(--purple), 0 8px 32px rgba(0,0,0,0.3); }

/* ── 6. PROGRESS & STARS ────────────────────────────────────────── */
.progress-bar { height: 8px; background: var(--border); border-radius: var(--r-full); overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--purple-light)); border-radius: var(--r-full); transition: width var(--t-std); }
.stars { display: flex; gap: 3px; }
.star-on { color: var(--gold); }
.star-off { color: var(--border); }

/* ── 7. APP SHELL ───────────────────────────────────────────────── */
.app-header {
  height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 var(--sp-md); gap: var(--sp-md); flex-shrink: 0; z-index: 10;
}
.hdr-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--purple-subtle); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.hdr-name { font-family: var(--font-h); font-weight: 700; font-size: 15px; }
.hdr-spacer { flex: 1; }
.hdr-streak { display: flex; align-items: center; gap: 4px; color: var(--gold); font-family: var(--font-h); font-weight: 700; font-size: 14px; }
.hdr-midi { padding: 4px 12px; border-radius: var(--r-full); font-size: 12px; font-weight: 700; cursor: pointer; }
.midi-off { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }
.midi-on { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }

.app-content { flex: 1; overflow: hidden; position: relative; }

.app-nav {
  height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around; flex-shrink: 0; z-index: 10;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-family: var(--font-h); font-size: 11px; font-weight: 600;
  padding: 6px 12px; border-radius: var(--r-sm); transition: color var(--t-fast);
  min-width: 48px; min-height: 48px; justify-content: center;
}
.nav-btn .nav-icon { font-size: 22px; }
.nav-btn.active { color: var(--purple); }
.nav-btn:hover { color: var(--text); }

/* ── 8. SCREENS ─────────────────────────────────────────────────── */
.screen { display: none; position: absolute; inset: 0; overflow-y: auto; padding: var(--sp-lg); }
.screen.active { display: flex; flex-direction: column; }

/* ── Login Screen ─── */
#screen-login {
  justify-content: center; align-items: center; gap: var(--sp-lg);
  background: radial-gradient(ellipse 80% 60% at 50% 30%, var(--purple-subtle) 0%, transparent 70%), var(--bg);
}
.login-title { font-family: var(--font-h); font-weight: 900; font-size: clamp(28px, 5vw, 48px); text-align: center;
  background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.login-subtitle { color: var(--text-muted); font-size: 16px; text-align: center; max-width: 400px; }
.avatar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: var(--sp-md); width: 100%; max-width: 540px; }
.avatar-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
  padding: var(--sp-lg) var(--sp-md); text-align: center; cursor: pointer;
  transition: border-color var(--t-std), box-shadow var(--t-std), transform var(--t-fast);
}
.avatar-card:hover { border-color: var(--purple); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.ava-emoji { font-size: 40px; display: block; margin-bottom: var(--sp-sm); }
.ava-name { font-family: var(--font-h); font-weight: 700; font-size: 15px; }
.ava-stars { font-size: 12px; color: var(--gold); margin-top: 4px; }
.add-card { border-style: dashed; }
.add-card .ava-emoji { opacity: 0.5; }

/* ── Home Screen ─── */
#screen-home { gap: var(--sp-lg); align-items: center; }
.world-section { width: 100%; max-width: 600px; }
.world-banner {
  display: flex; align-items: center; gap: var(--sp-md); padding: var(--sp-md) var(--sp-lg);
  border-radius: var(--r-md); margin-bottom: var(--sp-md); font-family: var(--font-h); font-weight: 800;
}
.world-banner.locked { opacity: 0.4; filter: grayscale(0.8); }
.world-1 { background: linear-gradient(135deg, #3D5A3E, #2A3F2B); border: 1px solid #5A7C5B; }
.world-2 { background: linear-gradient(135deg, #1E2E4A, #0F1A2E); border: 1px solid #2D4A7A; }
.world-3 { background: linear-gradient(135deg, #3D1E3D, #261226); border: 1px solid #6B2D6B; }
.song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--sp-sm); }
.song-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm);
  padding: var(--sp-md); cursor: pointer; transition: border-color var(--t-fast), transform var(--t-fast);
}
.song-card:hover { border-color: var(--purple); transform: translateY(-1px); }
.song-card.locked { opacity: 0.35; pointer-events: none; }
.song-title { font-family: var(--font-h); font-weight: 700; font-size: 14px; margin-bottom: 4px; }
.song-meta { font-size: 12px; color: var(--text-muted); }
.song-stars { margin-top: 6px; }

/* ── Lesson Screen ─── */
#screen-lesson { padding: 0; flex-direction: column; }
.lesson-hud {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-sm) var(--sp-md); background: var(--surface); border-bottom: 1px solid var(--border);
}
.hud-score { font-family: var(--font-h); font-weight: 800; font-size: 18px; }
.hud-streak { color: var(--gold); font-family: var(--font-h); font-weight: 700; }
.hud-progress { flex: 1; margin: 0 var(--sp-md); }
.lesson-canvas-wrap { flex: 1; position: relative; background: var(--bg); overflow: hidden; }
.lesson-canvas-wrap canvas { width: 100%; height: 100%; display: block; }
.speed-selector {
  display: flex; gap: var(--sp-xs); position: absolute; top: var(--sp-sm); right: var(--sp-sm); z-index: 5;
}
.speed-btn { font-size: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 6px 10px; cursor: pointer; }
.speed-btn.active { border-color: var(--purple); background: var(--purple-subtle); }

/* ── Piano Keyboard ─── */
.piano-wrap { container-type: inline-size; width: 100%; flex-shrink: 0; }
.piano {
  display: flex; position: relative; height: 120px; background: var(--surface);
  border-top: 1px solid var(--border); user-select: none; touch-action: manipulation;
}
.p-key {
  flex: 1; border-right: 1px solid var(--border-soft); background: var(--key-white);
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px;
  font-family: var(--font-h); font-size: 11px; color: #666; font-weight: 600;
  cursor: pointer; transition: background var(--t-fast);
  position: relative; z-index: 1;
}
.p-key:active, .p-key.pressed { background: var(--note-active); color: #fff; }
.p-key.correct { background: var(--note-correct); color: #fff; }
.p-key.incorrect { background: var(--note-incorrect); color: #fff; }
.p-key.next { background: var(--note-next); color: #333; }
.p-key-black {
  position: absolute; top: 0; width: 8%; height: 65%; background: var(--key-black);
  z-index: 2; border-radius: 0 0 4px 4px; cursor: pointer;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;
  font-size: 9px; color: #888; font-weight: 600;
}
.p-key-black:active, .p-key-black.pressed { background: var(--note-active); }
.p-key-black.correct { background: var(--note-correct); }
.p-key-black.incorrect { background: var(--note-incorrect); }
.p-key-black.next { background: var(--note-next); }

@container (max-width: 500px) {
  .piano { height: 90px; }
  .p-key { font-size: 9px; padding-bottom: 4px; }
}

/* ── Free Play ─── */
#screen-freeplay { padding: 0; flex-direction: column; }
.freeplay-controls {
  display: flex; align-items: center; gap: var(--sp-md); padding: var(--sp-sm) var(--sp-md);
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.octave-display { font-family: var(--font-h); font-weight: 800; font-size: 20px; }
.freeplay-piano-wrap { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }

/* ── Settings Screen ─── */
#screen-settings { gap: var(--sp-lg); align-items: center; }
.settings-group { width: 100%; max-width: 500px; }
.settings-title { font-family: var(--font-h); font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: var(--sp-sm); }
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--sp-md); background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-sm); margin-bottom: var(--sp-sm);
}
.setting-label { font-weight: 600; }
.setting-desc { font-size: 13px; color: var(--text-muted); }
/* Toggle switch */
.toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0; background: var(--border); border-radius: var(--r-full);
  cursor: pointer; transition: background var(--t-fast);
}
.toggle-track::after {
  content: ''; position: absolute; left: 3px; top: 3px; width: 22px; height: 22px;
  background: #fff; border-radius: 50%; transition: transform var(--t-fast);
}
.toggle input:checked + .toggle-track { background: var(--purple); }
.toggle input:checked + .toggle-track::after { transform: translateX(20px); }
/* Slider */
input[type="range"] {
  -webkit-appearance: none; width: 120px; height: 6px; background: var(--border);
  border-radius: var(--r-full); outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; background: var(--purple);
  border-radius: 50%; cursor: pointer;
}
/* Select */
.setting-select {
  background: var(--surface-2); color: var(--text); border: 1px solid var(--border);
  border-radius: var(--r-sm); padding: 8px 12px; font-family: var(--font-b);
  font-size: 14px; cursor: pointer;
}

/* ── Parent Dashboard ─── */
#screen-parent { gap: var(--sp-lg); align-items: center; }
.pin-overlay {
  position: absolute; inset: 0; background: var(--bg); z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--sp-lg);
}
.pin-input {
  display: flex; gap: var(--sp-sm);
}
.pin-digit {
  width: 52px; height: 60px; text-align: center; font-size: 28px; font-family: var(--font-h);
  font-weight: 800; background: var(--surface); border: 2px solid var(--border);
  border-radius: var(--r-sm); color: var(--text);
}
.pin-digit:focus { border-color: var(--purple); outline: none; }
.stat-card { text-align: center; }
.stat-num { font-family: var(--font-h); font-weight: 900; font-size: 36px; color: var(--purple); }
.stat-label { font-size: 13px; color: var(--text-muted); }
.parent-actions { display: flex; flex-wrap: wrap; gap: var(--sp-sm); justify-content: center; }

/* ── Celebration Overlay ─── */
.celebration-overlay {
  position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.celebration-overlay.active { display: flex; }
.celebration-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg);
  padding: var(--sp-xl) var(--sp-lg); text-align: center; max-width: 400px; width: 90%;
  animation: celebPop 0.5s ease-out;
}
@keyframes celebPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.celeb-emoji { font-size: 64px; margin-bottom: var(--sp-md); }
.celeb-title { font-family: var(--font-h); font-weight: 900; font-size: 28px; margin-bottom: var(--sp-sm); }
.celeb-sub { color: var(--text-muted); margin-bottom: var(--sp-lg); }
.celeb-stars { font-size: 40px; margin-bottom: var(--sp-lg); }

/* ── Utilities ──────────────────────────────────────────────────── */
.hidden { display: none !important; }
.flex-center { display: flex; align-items: center; justify-content: center; }
.gap-sm { gap: var(--sp-sm); }
.gap-md { gap: var(--sp-md); }
.mb-md { margin-bottom: var(--sp-md); }
.mb-lg { margin-bottom: var(--sp-lg); }
.w-full { width: 100%; }
.max-w-md { max-width: 500px; }
  </style>
</head>

  <!-- ════════════════════════════════════════════════════════════════
       APP HEADER
       ════════════════════════════════════════════════════════════════ -->
  <header class="app-header" id="app-header">

/* ================================================================
   PART 1 — STORAGE MANAGER (IndexedDB)
   ================================================================ */
const Storage = (() => {
  const DB = 'petit-maestro';
  const VER = 1;
  let db = null;

  function init() {
    return new Promise((resolve, reject) => {
      if (!window.indexedDB) { log('IndexedDB unavailable, using localStorage fallback'); resolve(); return; }
      const req = indexedDB.open(DB, VER);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('profiles')) d.createObjectStore('profiles', { keyPath: 'id' });
        if (!d.objectStoreNames.contains('progress')) d.createObjectStore('progress', { keyPath: 'key' });
        if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', { keyPath: 'key' });
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(); };
      req.onerror = () => { log('IndexedDB error'); resolve(); };
    });
  }

  function _tx(store, mode) { return db.transaction(store, mode).objectStore(store); }

  function get(store, key) {
    if (!db) return Promise.resolve(JSON.parse(localStorage.getItem(`pm_${store}_${key}`) || 'null'));
    return new Promise((res) => {
      const r = _tx(store, 'readonly').get(key);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => res(null);
    });
  }

  function put(store, value) {
    if (!db) { localStorage.setItem(`pm_${store}_${value.id || value.key}`, JSON.stringify(value)); return Promise.resolve(); }
    return new Promise((res) => {
      const r = _tx(store, 'readwrite').put(value);
      r.onsuccess = () => res();
      r.onerror = () => res();
    });
  }

  function getAll(store) {
    if (!db) {
      const items = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k.startsWith(`pm_${store}_`)) try { items.push(JSON.parse(localStorage.getItem(k))); } catch {}
      }
      return Promise.resolve(items);
    }
    return new Promise((res) => {
      const r = _tx(store, 'readonly').getAll();
      r.onsuccess = () => res(r.result || []);
      r.onerror = () => res([]);
    });
  }

  function del(store, key) {
    if (!db) { localStorage.removeItem(`pm_${store}_${key}`); return Promise.resolve(); }
    return new Promise((res) => {
      const r = _tx(store, 'readwrite').delete(key);
      r.onsuccess = () => res();
      r.onerror = () => res();
    });
  }

  return { init, get, put, getAll, del };
})();

/* ================================================================
   PART 2 — AUDIO ENGINE
   ================================================================ */
const Audio = (() => {
  let ctx = null;
  let masterGain = null;
  const active = [];
  const MAX_VOICES = 8;

  const FREQ = {};
  const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for (let oct = 2; oct <= 7; oct++) {
    NOTES.forEach((n, i) => {
      const midi = (oct + 1) * 12 + i;
      FREQ[n + oct] = 440 * Math.pow(2, (midi - 69) / 12);
    });
  }

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(ctx.destination);
  }

  function resume() {
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  function playNote(noteName, durMs = 500, velocity = 80) {
    if (!ctx) init();
    resume();
    const freq = FREQ[noteName];
    if (!freq) return;

    // Voice stealing
    while (active.length >= MAX_VOICES) {
      const old = active.shift();
      try { old.osc1.stop(); old.osc2.stop(); } catch {}
    }

    const vol = (velocity / 127) * 0.5;
    const now = ctx.currentTime;

    // Triangle wave + slight detune for warmth
    const osc1 = ctx.createOscillator();
    osc1.type = 'triangle';
    osc1.frequency.value = freq;

    const osc2 = ctx.createOscillator();
    osc2.type = 'triangle';
    osc2.frequency.value = freq * 1.003;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, now);
    env.gain.linearRampToValueAtTime(vol, now + 0.02);
    env.gain.exponentialRampToValueAtTime(vol * 0.6, now + 0.1);

    const release = now + (durMs / 1000);
    env.gain.setValueAtTime(vol * 0.6, release - 0.05);
    env.gain.exponentialRampToValueAtTime(0.001, release + 0.1);

    // Spatial pan: low notes left, high notes right
    const pan = ctx.createStereoPanner();
    const midiNum = 12 * Math.log2(freq / 440) + 69;
    pan.pan.value = Math.max(-1, Math.min(1, (midiNum - 60) / 30));

    osc1.connect(env); osc2.connect(env);
    env.connect(pan);
    pan.connect(masterGain);

    osc1.start(now); osc2.start(now);
    osc1.stop(release + 0.15); osc2.stop(release + 0.15);

    const voice = { osc1, osc2 };
    active.push(voice);
    setTimeout(() => { const idx = active.indexOf(voice); if (idx > -1) active.splice(idx, 1); }, durMs + 200);
  }

  function playNoteInstant(noteName, velocity = 80) {
    playNote(noteName, 800, velocity);
  }

  function setVolume(v) { if (masterGain) masterGain.gain.value = Math.max(0, Math.min(1, v)); }

  function tick(accent = false) {
    if (!ctx) return;
    resume();
    const osc = ctx.createOscillator();
    const env = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = accent ? 1000 : 800;
    env.gain.setValueAtTime(0.3, ctx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.connect(env); env.connect(masterGain);
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  }

  return { init, resume, playNote, playNoteInstant, setVolume, tick, FREQ };
})();

/* ================================================================
   PART 3 — MIDI MANAGER
   ================================================================ */
const MIDI = (() => {
  let access = null;
  let activeInput = null;
  let activeOutput = null;
  let deviceName = null;
  let status = 'disconnected';
  const onNoteOn = [];
  const onNoteOff = [];

  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

  function midiToNote(num) {
    const oct = Math.floor(num / 12) - 1;
    return { note: NOTE_NAMES[num % 12], octave: oct, full: NOTE_NAMES[num % 12] + oct, midi: num };
  }

  function handleMsg(e) {
    const [st, num, vel] = e.data;
    const cmd = st & 0xF0;
    const info = midiToNote(num);
    if (cmd === 0x90 && vel > 0) {
      onNoteOn.forEach(cb => cb({ ...info, velocity: vel }));
    } else if (cmd === 0x80 || (cmd === 0x90 && vel === 0)) {
      onNoteOff.forEach(cb => cb({ ...info, velocity: 0 }));
    }
  }

  function findBest(inputs) {
    for (const inp of inputs.values()) {
      if (inp.name.toLowerCase().includes('lumi')) return inp;
    }
    return inputs.values().next().value || null;
  }

  function findOutput(outputs) {
    for (const out of outputs.values()) {
      if (out.name.toLowerCase().includes('lumi')) return out;
    }
    return null;
  }

  function connect(inp) {
    if (activeInput) activeInput.onmidimessage = null;
    activeInput = inp;
    activeInput.onmidimessage = handleMsg;
    deviceName = inp.name;
    status = 'connected';
    updateUI();
  }

  function scan() {
    if (!access) return;
    const best = findBest(access.inputs);
    activeOutput = findOutput(access.outputs);
    if (best) { connect(best); } else {
      activeInput = null; deviceName = null; status = 'disconnected'; updateUI();
    }
  }

  function updateUI() {
    const pill = document.getElementById('hdr-midi');
    if (!pill) return;
    if (status === 'connected') {
      pill.className = 'hdr-midi midi-on';
      pill.textContent = '🎹 ' + (deviceName || t('connected'));
    } else {
      pill.className = 'hdr-midi midi-off';
      pill.textContent = '🎹 ' + t('disconnected');
    }
  }

  async function init() {
    if (!navigator.requestMIDIAccess) { log('Web MIDI not supported'); updateUI(); return; }
    try {
      access = await navigator.requestMIDIAccess({ sysex: true });
      access.onstatechange = () => scan();
      scan();
    } catch (err) {
      log('MIDI access denied:', err);
      updateUI();
    }
  }

  function getOutput() { return activeOutput; }
  function isConnected() { return status === 'connected'; }
  function isLumi() { return deviceName && deviceName.toLowerCase().includes('lumi'); }

  return { init, onNoteOn, onNoteOff, getOutput, isConnected, isLumi, updateUI };
})();

/* ================================================================
   PART 4 — LUMI LED CONTROLLER
   ================================================================ */
const Lumi = (() => {
  const MFR = [0x00, 0x21, 0x10]; // ROLI
  const DEV = 0x37; // LUMI

  function checksum(bytes) {
    let c = bytes.length;
    for (const b of bytes) c = (c * 3 + b) & 0xFF;
    return c & 0x7F;
  }

  function send(cmdBytes) {
    const out = MIDI.getOutput();
    if (!out || !MIDI.isLumi()) return;
    const msg = [0xF0, ...MFR, 0x77, DEV, ...cmdBytes, checksum(cmdBytes), 0xF7];
    try { out.send(msg); } catch {}
  }

  function rgbToSysex(r, g, b) {
    return [
      ((b & 0x3) << 5) | 0x04,
      ((b >> 2) & 0x3F) | (g & 1),
      g >> 1,
      r & 0x7F,
      (r >> 7) | 0x7E
    ];
  }

  function setGlobalColor(r, g, b) { send([0x10, 0x20, ...rgbToSysex(r, g, b), 0x03]); }
  function setRootColor(r, g, b) { send([0x10, 0x30, ...rgbToSysex(r, g, b), 0x03]); }

  function setBrightness(pct) {
    const v = Math.round((pct / 100) * 25);
    send([0x10, 0x40, ((v & 0x1F) << 2) | 0x04, (v >> 3) & 0x7F, 0, 0, 0, 0]);
  }

  function highlightNext() { setGlobalColor(0xF0, 0xE4, 0x42); } // Yellow
  function highlightCorrect() { setGlobalColor(0x00, 0x9E, 0x73); } // Teal
  function highlightIncorrect() { setGlobalColor(0xD5, 0x5E, 0x00); } // Orange
  function clearLEDs() { setGlobalColor(0x7C, 0x3A, 0xED); } // Default purple

  return { setGlobalColor, setRootColor, setBrightness, highlightNext, highlightCorrect, highlightIncorrect, clearLEDs };
})();

/* ================================================================
   PART 6 — GAME ENGINE (Falling Notes + Scoring)
   ================================================================ */
const Game = (() => {
  let canvas, ctx2d;
  let currentSong = null;
  let speed = 'normal';
  let noteIndex = 0;
  let score = 0;
  let streak = 0;
  let maxStreak = 0;
  let correct = 0;
  let total = 0;
  let running = false;
  let waitingForNote = false;
  let fallingNotes = [];
  let lastFrame = 0;
  const FALL_SPEED = 150; // px per second at normal
  const HIT_Y = 0.85; // fraction of canvas height

  function init() {
    canvas = document.getElementById('game-canvas');
    ctx2d = canvas.getContext('2d');
  }

  function startSong(song, spd = 'normal') {
    currentSong = song;
    speed = spd;
    noteIndex = 0; score = 0; streak = 0; maxStreak = 0; correct = 0; total = 0;
    fallingNotes = [];
    running = true;
    waitingForNote = true;

    resizeCanvas();
    scheduleNotes();
    updateHUD();
    Lumi.highlightNext();
    lastFrame = performance.now();
    requestAnimationFrame(gameLoop);
  }

  function resizeCanvas() {
    const wrap = canvas.parentElement;
    canvas.width = wrap.clientWidth * devicePixelRatio;
    canvas.height = wrap.clientHeight * devicePixelRatio;
    ctx2d.scale(devicePixelRatio, devicePixelRatio);
  }

  function scheduleNotes() {
    const notes = currentSong.notes;
    const bpm = currentSong.bpm[speed] || currentSong.bpm.normal;
    const beatMs = 60000 / bpm;
    let elapsed = 0;

    const durMap = { whole: 4, half: 2, 'dotted-half': 3, quarter: 1, 'dotted-quarter': 1.5, eighth: 0.5, sixteenth: 0.25 };

    notes.forEach((n, i) => {
      const dur = (durMap[n.duration] || 1) * beatMs;
      fallingNotes.push({
        note: n.note, hand: n.hand, finger: n.finger,
        y: -(elapsed / 1000) * FALL_SPEED - 100, // Start above canvas
        targetTime: elapsed, dur, hit: false, missed: false, index: i
      });
      elapsed += dur;
    });
  }

  function gameLoop(ts) {
    if (!running) return;
    const dt = Math.min(ts - lastFrame, 50) / 1000; // cap at 50ms
    lastFrame = ts;

    const w = canvas.width / devicePixelRatio;
    const h = canvas.height / devicePixelRatio;
    const hitLine = h * HIT_Y;

    // Clear
    ctx2d.clearRect(0, 0, w, h);

    // Draw hit line
    ctx2d.strokeStyle = 'rgba(124,58,237,0.4)';
    ctx2d.lineWidth = 2;
    ctx2d.beginPath();
    ctx2d.moveTo(0, hitLine);
    ctx2d.lineTo(w, hitLine);
    ctx2d.stroke();

    // Update and draw falling notes
    const speedMul = { turtle: 0.6, normal: 1, rabbit: 1.4, rocket: 1.8 }[speed] || 1;
    let currentTarget = null;

    fallingNotes.forEach(fn => {
      if (!fn.hit && !fn.missed) {
        fn.y += FALL_SPEED * speedMul * dt;
      }

      // Draw note
      const noteW = Math.max(w / 14, 30);
      const noteH = 24;
      const keyIndex = getKeyPosition(fn.note);
      const x = (keyIndex / 14) * w;

      if (fn.y > -noteH && fn.y < h + noteH) {
        ctx2d.fillStyle = fn.hit ? 'rgba(0,158,115,0.6)' : fn.missed ? 'rgba(213,94,0,0.4)' : 'rgba(124,58,237,0.8)';
        ctx2d.beginPath();
        ctx2d.roundRect(x + 2, fn.y, noteW - 4, noteH, 6);
        ctx2d.fill();

        // Note label
        ctx2d.fillStyle = '#fff';
        ctx2d.font = '12px Nunito';
        ctx2d.textAlign = 'center';
        ctx2d.fillText(noteDisplay(fn.note), x + noteW / 2, fn.y + 16);
      }

      // Wait mode: find current target
      if (!fn.hit && !fn.missed && fn.index === noteIndex) {
        currentTarget = fn;
      }

      // Missed detection (only in timed mode)
      if (!waitingForNote && !fn.hit && !fn.missed && fn.y > hitLine + 50) {
        fn.missed = true;
        total++;
        streak = 0;
        updateHUD();
      }
    });

    // In wait mode, position current note at hit line
    if (waitingForNote && currentTarget) {
      currentTarget.y = hitLine - 12;
    }

    // Check if all notes done
    if (noteIndex >= currentSong.notes.length) {
      running = false;
      endSong();
      return;
    }

    requestAnimationFrame(gameLoop);
  }

  function getKeyPosition(noteName) {
    const map = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    const letter = noteName.replace(/[0-9]/g, '');
    return map[letter] || 0;
  }

  function handleNoteInput(noteName) {
    if (!running || noteIndex >= currentSong.notes.length) return;

    const expected = currentSong.notes[noteIndex];
    const fn = fallingNotes[noteIndex];

    if (noteName === expected.note) {
      // Correct!
      fn.hit = true;
      correct++;
      total++;
      streak++;
      if (streak > maxStreak) maxStreak = streak;
      score += 10 + streak;
      noteIndex++;
      Lumi.highlightCorrect();
      highlightKey(noteName, 'correct');

      Audio.playNoteInstant(noteName, 90);

      setTimeout(() => {
        clearKeyHighlights();
        if (noteIndex < currentSong.notes.length) {
          Lumi.highlightNext();
          highlightKey(currentSong.notes[noteIndex].note, 'next');
        }
      }, 200);
    } else {
      // Incorrect
      total++;
      streak = 0;
      Lumi.highlightIncorrect();
      highlightKey(noteName, 'incorrect');
      Audio.playNoteInstant(noteName, 60);
      setTimeout(() => { clearKeyHighlights(); Lumi.highlightNext(); }, 300);
    }

    updateHUD();
  }

  function updateHUD() {
    const el = (id) => document.getElementById(id);
    el('hud-score').textContent = score;
    el('hud-streak').textContent = '🔥 ' + streak;
    if (currentSong) {
      const pct = Math.round((noteIndex / currentSong.notes.length) * 100);
      el('hud-progress-fill').style.width = pct + '%';
    }
  }

  function endSong() {
    Lumi.clearLEDs();
    clearKeyHighlights();
    const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
    const stars = accuracy >= 90 ? 3 : accuracy >= 80 ? 2 : accuracy >= 70 ? 1 : 0;

    // Save progress
    saveProgress(currentSong.id, stars, accuracy, score);

    // Show celebration
    showCelebration(stars, accuracy, score);
  }

  function setSpeed(s) { speed = s; }
  function stop() { running = false; Lumi.clearLEDs(); clearKeyHighlights(); }

  return { init, startSong, handleNoteInput, setSpeed, stop };
})();

/* ================================================================
   PART 7 — PIANO KEYBOARD BUILDER
   ================================================================ */
function buildPiano(containerId, octaveStart = 4, numOctaves = 2) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';

  const whiteNotes = ['C','D','E','F','G','A','B'];
  const blackNotes = { C: 'C#', D: 'D#', F: 'F#', G: 'G#', A: 'A#' };
  const blackOffsets = { C: 0.65, D: 1.75, F: 3.6, G: 4.7, A: 5.8 };

  for (let oct = octaveStart; oct < octaveStart + numOctaves; oct++) {
    const octOffset = (oct - octaveStart) * 7;

    whiteNotes.forEach((n, i) => {
      const key = document.createElement('div');
      key.className = 'p-key';
      key.dataset.note = n + oct;
      key.textContent = noteDisplay(n + oct);
      key.setAttribute('role', 'button');
      key.setAttribute('aria-label', noteDisplay(n + oct));

      key.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        onKeyPress(n + oct);
      });
      key.addEventListener('pointerup', () => onKeyRelease(n + oct));

      container.appendChild(key);

      // Black key
      if (blackNotes[n]) {
        const bk = document.createElement('div');
        bk.className = 'p-key-black';
        bk.dataset.note = blackNotes[n] + oct;
        const totalWhites = numOctaves * 7;
        const leftPct = ((octOffset + blackOffsets[n]) / totalWhites) * 100;
        bk.style.left = leftPct + '%';
        bk.setAttribute('role', 'button');
        bk.setAttribute('aria-label', noteDisplay(blackNotes[n] + oct));

        bk.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          onKeyPress(blackNotes[n] + oct);
        });
        bk.addEventListener('pointerup', () => onKeyRelease(blackNotes[n] + oct));

        container.appendChild(bk);
      }
    });
  }
}

function onKeyPress(note) {
  Audio.init();
  Audio.resume();
  Audio.playNoteInstant(note);

  const activeScreen = document.querySelector('.screen.active');
  if (activeScreen && activeScreen.id === 'screen-lesson') {
    Game.handleNoteInput(note);
  }
}

function onKeyRelease(note) {
  // Future: sustain handling
}

function highlightKey(note, state) {
  document.querySelectorAll(`.p-key[data-note="${note}"], .p-key-black[data-note="${note}"]`).forEach(k => {
    k.classList.remove('correct', 'incorrect', 'next', 'pressed');
    if (state) k.classList.add(state);
  });
}

function clearKeyHighlights() {
  document.querySelectorAll('.p-key, .p-key-black').forEach(k => {
    k.classList.remove('correct', 'incorrect', 'next', 'pressed');
  });
}

/* ================================================================
   PART 8 — COMPUTER KEYBOARD MAPPING
   ================================================================ */
const KEY_MAP = {
  'a': 'C4', 'w': 'C#4', 's': 'D4', 'e': 'D#4', 'd': 'E4',
  'f': 'F4', 't': 'F#4', 'g': 'G4', 'y': 'G#4', 'h': 'A4',
  'u': 'A#4', 'j': 'B4', 'k': 'C5', 'o': 'C#5', 'l': 'D5',
};
const keysDown = new Set();

document.addEventListener('keydown', (e) => {
  if (e.repeat || e.target.tagName === 'INPUT') return;
  const note = KEY_MAP[e.key.toLowerCase()];
  if (note && !keysDown.has(e.key)) {
    keysDown.add(e.key);
    onKeyPress(note);
    highlightKey(note, 'pressed');
  }
  // Shortcuts
  if (e.key === 'Escape') {
    const active = document.querySelector('.screen.active');
    if (active && active.id !== 'screen-login' && active.id !== 'screen-home') {
      showScreen('screen-home');
    }
  }
  if (e.key === 'F11' || (e.key === 'f' && e.metaKey)) {
    e.preventDefault();
    document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen?.();
  }
});

document.addEventListener('keyup', (e) => {
  keysDown.delete(e.key);
  const note = KEY_MAP[e.key.toLowerCase()];
  if (note) {
    onKeyRelease(note);
    highlightKey(note, null);
  }
});

/* ================================================================
   PART 9 — PROFILES & PROGRESSION
   ================================================================ */
let currentProfile = null;
let profiles = [];
let progress = {};

async function loadProfiles() {
  profiles = await Storage.getAll('profiles');
  renderLogin();
}

function renderLogin() {
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = '';

  profiles.forEach(p => {
    const card = document.createElement('div');
    card.className = 'avatar-card';
    card.innerHTML = `<span class="ava-emoji">${p.avatar}</span><span class="ava-name">${escapeHtml(p.name)}</span><div class="ava-stars">⭐ ${p.totalStars || 0}</div>`;
    card.addEventListener('click', () => selectProfile(p));
    grid.appendChild(card);
  });

  // Add card
  if (profiles.length < 6) {
    const add = document.createElement('div');
    add.className = 'avatar-card add-card';
    add.innerHTML = `<span class="ava-emoji">➕</span><span class="ava-name">${t('add_profile')}</span>`;
    add.addEventListener('click', showNewProfileDialog);
    grid.appendChild(add);
  }
}

const AVATARS = ['🐱','🐶','🐰','🦊','🐻','🐼','🐨','🦁','🐸','🦄','🐙','🦋','🐢','🦜','🐬','🦉','🐝','🦩','🐳','🦘'];

function showNewProfileDialog() {
  const name = prompt(t('enter_name'));
  if (!name || !name.trim()) return;
  const ageStr = prompt(t('enter_age'));
  const age = parseInt(ageStr) || 6;
  const avatar = AVATARS[Math.floor(Math.random() * AVATARS.length)];

  const profile = {
    id: Date.now().toString(),
    name: name.trim().substring(0, 20),
    avatar, age: Math.max(3, Math.min(12, age)),
    color: '#7C3AED',
    createdAt: new Date().toISOString(),
    totalStars: 0, streakDays: 0, lastPlayedDate: null
  };

  Storage.put('profiles', profile).then(() => {
    profiles.push(profile);
    renderLogin();
  });
}

async function selectProfile(p) {
  currentProfile = p;
  progress = {};
  const allProgress = await Storage.getAll('progress');
  allProgress.filter(pr => pr.key.startsWith(p.id + '_')).forEach(pr => {
    progress[pr.songId] = pr;
  });

  // Update header
  document.getElementById('hdr-avatar').textContent = p.avatar;
  document.getElementById('hdr-name').textContent = p.name;
  document.getElementById('hdr-streak-num').textContent = p.streakDays || 0;

  // Update streak
  const today = new Date().toISOString().slice(0, 10);
  if (p.lastPlayedDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    p.streakDays = p.lastPlayedDate === yesterday ? (p.streakDays || 0) + 1 : 1;
    p.lastPlayedDate = today;
    await Storage.put('profiles', p);
    document.getElementById('hdr-streak-num').textContent = p.streakDays;
  }

  showScreen('screen-home');
  renderHome();
}

async function saveProgress(songId, stars, accuracy, score) {
  if (!currentProfile) return;
  const key = currentProfile.id + '_' + songId;
  const existing = progress[songId];
  const best = existing ? Math.max(existing.stars, stars) : stars;

  const rec = { key, songId, profileId: currentProfile.id, stars: best, accuracy, score, date: new Date().toISOString() };
  progress[songId] = rec;
  await Storage.put('progress', rec);

  // Update total stars
  let total = 0;
  Object.values(progress).forEach(p => { total += p.stars; });
  currentProfile.totalStars = total;
  await Storage.put('profiles', currentProfile);
}

/* ================================================================
   PART 10 — HOME SCREEN (Worlds + Songs)
   ================================================================ */
function renderHome() {
  const container = document.getElementById('worlds-container');
  container.innerHTML = '';

  const totalStars = currentProfile ? currentProfile.totalStars || 0 : 0;

  WORLDS.forEach(w => {
    const unlocked = totalStars >= w.starsToUnlock;
    const section = document.createElement('div');
    section.className = 'world-section mb-lg';

    const banner = document.createElement('div');
    banner.className = `world-banner ${w.color} ${unlocked ? '' : 'locked'}`;
    banner.innerHTML = `<span style="font-size:24px">${w.icon}</span> <span>${t(w.name)}</span>`;

    if (!unlocked) {
      banner.innerHTML += ` <span style="font-size:12px;margin-left:auto;opacity:0.7">${t('unlock_need', { n: w.starsToUnlock })}</span>`;
    }

    section.appendChild(banner);

    if (unlocked) {
      const grid = document.createElement('div');
      grid.className = 'song-grid';

      SONGS.filter(s => s.world === w.id).forEach(song => {
        const songProgress = progress[song.id];
        const card = document.createElement('div');
        card.className = 'song-card';

        const title = song.title[currentLang] || song.title.en || song.title.fr;
        const starsHtml = songProgress
          ? '⭐'.repeat(songProgress.stars) + '☆'.repeat(3 - songProgress.stars)
          : '☆☆☆';

        card.innerHTML = `<div class="song-title">${escapeHtml(title)}</div><div class="song-meta">${song.composer}</div><div class="song-stars">${starsHtml}</div>`;
        card.addEventListener('click', () => startLesson(song));
        grid.appendChild(card);
      });

      section.appendChild(grid);
    }

    container.appendChild(section);
  });
}

function startLesson(song) {
  showScreen('screen-lesson');
  buildPiano('lesson-piano', 4, 2);
  Game.init();
  Game.startSong(song, 'normal');

  // Highlight first note
  if (song.notes.length > 0) {
    highlightKey(song.notes[0].note, 'next');
  }

  // Speak song name
  speak(song.title[currentLang] || song.title.fr);
}

/* ================================================================
   PART 11 — CELEBRATION
   ================================================================ */
function showCelebration(stars, accuracy, score) {
  const el = (id) => document.getElementById(id);
  el('celeb-emoji').textContent = stars >= 3 ? '🌟' : stars >= 2 ? '⭐' : stars >= 1 ? '👏' : '💪';
  el('celeb-title').textContent = t('bravo');
  el('celeb-sub').textContent = `${accuracy}% ${t('correct')} — Score: ${score}`;
  el('celeb-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  el('celeb-btn').textContent = t('continue');
  el('celeb-btn').onclick = () => {
    el('celebration').classList.remove('active');
    showScreen('screen-home');
    renderHome();
  };
  el('celebration').classList.add('active');
  speak(t('bravo'));
}

/* ================================================================
   PART 12 — SCREEN MANAGER
   ================================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const screen = document.getElementById(id);
  if (screen) screen.classList.add('active');

  // Nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.screen === id);
  });

  // Header visibility
  const showHeader = id !== 'screen-login';
  document.getElementById('app-header').style.display = showHeader ? 'flex' : 'none';
  document.getElementById('app-nav').style.display = showHeader ? 'flex' : 'none';

  // Stop game if leaving lesson
  if (id !== 'screen-lesson') Game.stop();
}

/* ================================================================
   PART 13 — SETTINGS
   ================================================================ */
function renderSettings() {
  const container = document.getElementById('settings-container');
  container.innerHTML = '';

  const groups = [
    {
      title: t('language'),
      items: [{
        type: 'select', key: 'lang', options: [
          { value: 'fr', label: '🇫🇷 Francais' },
          { value: 'en', label: '🇬🇧 English' }
        ], current: currentLang,
        onChange: (v) => { setLang(v); renderSettings(); renderHome(); }
      }]
    },
    {
      title: t('volume'),
      items: [{ type: 'range', key: 'volume', min: 0, max: 100, current: 70, onChange: (v) => Audio.setVolume(v / 100) }]
    },
    {
      title: t('notation'),
      items: [{
        type: 'select', key: 'notation', options: [
          { value: 'auto', label: t('notation_auto') },
          { value: 'solfege', label: t('notation_solfege') },
          { value: 'letters', label: t('notation_letters') }
        ], current: notationMode,
        onChange: (v) => { notationMode = v; }
      }]
    },
    {
      title: t('accessibility'),
      items: [
        { type: 'toggle', key: 'colorblind', label: t('colorblind'), current: document.body.classList.contains('colorblind-mode'), onChange: (v) => document.body.classList.toggle('colorblind-mode', v) },
        { type: 'toggle', key: 'dyslexia', label: t('dyslexia'), current: document.body.classList.contains('dyslexia-mode'), onChange: (v) => document.body.classList.toggle('dyslexia-mode', v) },
        { type: 'toggle', key: 'reducedMotion', label: t('reduced_motion'), current: document.body.classList.contains('reduced-motion'), onChange: (v) => document.body.classList.toggle('reduced-motion', v) },
        { type: 'toggle', key: 'focusMode', label: t('focus_mode'), current: document.body.classList.contains('focus-mode'), onChange: (v) => document.body.classList.toggle('focus-mode', v) },
      ]
    },
    {
      title: t('fullscreen'),
      items: [{ type: 'button', label: t('fullscreen'), onClick: () => { document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen?.(); } }]
    }
  ];

  groups.forEach(g => {
    const title = document.createElement('div');
    title.className = 'settings-title';
    title.textContent = g.title;
    container.appendChild(title);

    g.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'setting-row';

      if (item.type === 'select') {
        row.innerHTML = `<span class="setting-label">${g.title}</span>`;
        const sel = document.createElement('select');
        sel.className = 'setting-select';
        item.options.forEach(o => {
          const opt = document.createElement('option');
          opt.value = o.value; opt.textContent = o.label;
          if (o.value === item.current) opt.selected = true;
          sel.appendChild(opt);
        });
        sel.addEventListener('change', () => item.onChange(sel.value));
        row.appendChild(sel);
      } else if (item.type === 'range') {
        row.innerHTML = `<span class="setting-label">${g.title}</span>`;
        const input = document.createElement('input');
        input.type = 'range'; input.min = item.min; input.max = item.max; input.value = item.current;
        input.addEventListener('input', () => item.onChange(parseInt(input.value)));
        row.appendChild(input);
      } else if (item.type === 'toggle') {
        row.innerHTML = `<span class="setting-label">${item.label}</span>`;
        const toggle = document.createElement('label');
        toggle.className = 'toggle';
        toggle.innerHTML = `<input type="checkbox" ${item.current ? 'checked' : ''}><span class="toggle-track"></span>`;
        toggle.querySelector('input').addEventListener('change', (e) => item.onChange(e.target.checked));
        row.appendChild(toggle);
      } else if (item.type === 'button') {
        const btn = document.createElement('button');
        btn.className = 'btn btn-secondary btn-sm w-full';
        btn.textContent = item.label;
        btn.addEventListener('click', item.onClick);
        row.appendChild(btn);
      }

      container.appendChild(row);
    });
  });
}

/* ================================================================
   PART 14 — PARENT DASHBOARD
   ================================================================ */
function initParentDashboard() {
  // PIN input
  const pinContainer = document.getElementById('pin-input');
  pinContainer.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const input = document.createElement('input');
    input.type = 'password'; input.maxLength = 1; input.className = 'pin-digit'; input.inputMode = 'numeric';
    input.addEventListener('input', (e) => {
      if (e.target.value && i < 3) pinContainer.children[i + 1].focus();
      checkPIN();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) pinContainer.children[i - 1].focus();
    });
    pinContainer.appendChild(input);
  }
}

function checkPIN() {
  const digits = [...document.querySelectorAll('.pin-digit')].map(d => d.value).join('');
  if (digits.length === 4) {
    // Default PIN: 1234 (no hash for simplicity in v1)
    if (digits === '1234') {
      document.getElementById('pin-overlay').classList.add('hidden');
      document.getElementById('parent-content').classList.remove('hidden');
      document.getElementById('parent-content').style.display = 'flex';
      renderParentStats();
    } else {
      document.getElementById('pin-error').textContent = t('pin_wrong');
      document.getElementById('pin-error').classList.remove('hidden');
      document.querySelectorAll('.pin-digit').forEach(d => { d.value = ''; });
      document.querySelector('.pin-digit').focus();
    }
  }
}

function renderParentStats() {
  if (!currentProfile) return;
  const songs = Object.keys(progress).length;
  const stars = currentProfile.totalStars || 0;
  const accs = Object.values(progress).map(p => p.accuracy).filter(Boolean);
  const avgAcc = accs.length > 0 ? Math.round(accs.reduce((a, b) => a + b, 0) / accs.length) : 0;

  document.getElementById('stat-songs').textContent = songs;
  document.getElementById('stat-stars').textContent = stars;
  document.getElementById('stat-accuracy').textContent = avgAcc + '%';
}

// Export
document.getElementById('btn-export')?.addEventListener('click', async () => {
  const data = { profiles: await Storage.getAll('profiles'), progress: await Storage.getAll('progress'), exportDate: new Date().toISOString(), version: '1.0.0' };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'petit-maestro-backup.json'; a.click();
  URL.revokeObjectURL(url);
});

// Import
document.getElementById('btn-import')?.addEventListener('click', () => document.getElementById('import-file').click());
document.getElementById('import-file')?.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.profiles && Array.isArray(data.profiles)) {
      for (const p of data.profiles) await Storage.put('profiles', p);
    }
    if (data.progress && Array.isArray(data.progress)) {
      for (const p of data.progress) await Storage.put('progress', p);
    }
    await loadProfiles();
    alert('Import OK!');
  } catch { alert('Erreur: fichier invalide'); }
});

// Print
document.getElementById('btn-print')?.addEventListener('click', () => window.print());
document.getElementById('btn-parent-back')?.addEventListener('click', () => {
  document.getElementById('pin-overlay').classList.remove('hidden');
  document.getElementById('parent-content').classList.add('hidden');
  showScreen('screen-home');
});

/* ================================================================
   PART 15 — SPEECH SYNTHESIS
   ================================================================ */
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = currentLang === 'fr' ? 'fr-FR' : 'en-US';
  u.rate = 0.85;
  u.volume = 0.8;
  speechSynthesis.speak(u);
}

/* ================================================================
   PART 16 — UTILITIES
   ================================================================ */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ================================================================
   PART 17 — EVENT LISTENERS
   ================================================================ */
// Navigation
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.screen;
    showScreen(target);
    if (target === 'screen-home') renderHome();
    if (target === 'screen-settings') renderSettings();
    if (target === 'screen-freeplay') buildPiano('freeplay-piano', 4, 2);
  });
});

// Lesson back
document.getElementById('lesson-back')?.addEventListener('click', () => { Game.stop(); showScreen('screen-home'); renderHome(); });
document.getElementById('freeplay-back')?.addEventListener('click', () => showScreen('screen-home'));

// Speed selector
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    Game.setSpeed(btn.dataset.speed);
  });
});

// Octave controls
let freeplayOctave = 4;
document.getElementById('oct-down')?.addEventListener('click', () => {
  freeplayOctave = Math.max(2, freeplayOctave - 1);
  document.getElementById('oct-display').textContent = 'C' + freeplayOctave;
  buildPiano('freeplay-piano', freeplayOctave, 2);
});
document.getElementById('oct-up')?.addEventListener('click', () => {
  freeplayOctave = Math.min(6, freeplayOctave + 1);
  document.getElementById('oct-display').textContent = 'C' + freeplayOctave;
  buildPiano('freeplay-piano', freeplayOctave, 2);
});

// MIDI pill
document.getElementById('hdr-midi')?.addEventListener('click', () => {
  if (!MIDI.isConnected()) {
    speak(currentLang === 'fr' ? 'Connectez un clavier MIDI en USB' : 'Connect a MIDI keyboard via USB');
  }
});

// Parent button
document.getElementById('hdr-parent')?.addEventListener('click', () => {
  showScreen('screen-parent');
  initParentDashboard();
  document.querySelector('.pin-digit')?.focus();
});

// MIDI input integration
MIDI.onNoteOn.push((info) => {
  Audio.init();
  Audio.resume();
  onKeyPress(info.full);
  highlightKey(info.full, 'pressed');
});

MIDI.onNoteOff.push((info) => {
  onKeyRelease(info.full);
  highlightKey(info.full, null);
});

// First interaction: resume audio
document.addEventListener('click', () => { Audio.init(); Audio.resume(); }, { once: true });
document.addEventListener('touchstart', () => { Audio.init(); Audio.resume(); }, { once: true });

/* ================================================================
   PART 18 — APP INITIALIZATION
   ================================================================ */
async function initApp() {
  try {
    await Storage.init();
    await loadProfiles();
    MIDI.init();
    setLang(navigator.language?.startsWith('en') ? 'en' : 'fr');
    showScreen('screen-login');

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    log('Petit Maestro initialized');
  } catch (err) {
    log('Init error:', err);
  }
}

initApp();
